<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍系統</title>
    <style>
        :root {
            --bg: #121212;
            --card: #1C1C1E;
            --text: #F2F2F7;
            --muted: #8E8E93;
            --p1-color: #00ff88; /* 至凱的專屬霓虹綠 */
            --p2-color: #00e5ff; /* 柏致的專屬霓虹藍 */
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* 加上微微的頂部漸層光暈，增加質感 */
            background: radial-gradient(circle at top, #2a2a35 0%, #121212 50%);
        }

        /* 登入卡片主體 */
        .login-card {
            background: var(--card);
            border: 1px solid #2C2C2E;
            border-radius: 24px;
            padding: 40px 25px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            /* 進場動畫 */
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 浮動的月亮圖示 */
        .icon-wrapper {
            font-size: 64px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* 大按鈕設計 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            text-decoration: none;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 16px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:active {
            transform: scale(0.96); /* 點擊時內縮 */
        }

        /* 至凱專屬按鈕 */
        .btn-p1 {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: var(--p1-color);
        }

        /* 柏致專屬按鈕 */
        .btn-p2 {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: var(--p2-color);
        }

        /* 宿舍帳本按鈕 */
        .btn-split {
            background: rgba(255, 159, 10, 0.08);
            border: 1px solid rgba(255, 159, 10, 0.4);
            color: #FF9F0A;
            margin-top: 8px;
        }

        /* 即時時鐘設計 */
        .time-display {
            margin-top: 25px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            background: #000;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2C2C2E;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--p1-color);
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 8px var(--p1-color); }
            to { opacity: 0.2; box-shadow: none; }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="icon-wrapper">🏠</div>
        <h1>宿舍系統</h1>
        <div class="subtitle">請選擇您的專屬身分登入<br>每日 00:00 - 02:00 準時打卡</div>

        <!-- 至凱的入口 -->
        <a href="player.html?player=p1" class="btn btn-p1">
            <span style="font-size: 22px;">👦🏻</span> 至凱 的睡眠金庫
        </a>

        <!-- 柏致的入口 -->
        <a href="player.html?player=p2" class="btn btn-p2">
            <span style="font-size: 22px;">👦🏼</span> 柏致 的睡眠金庫
        </a>

        <!-- 帳本入口 -->
        <a href="split.html" class="btn btn-split">
            <span style="font-size: 22px;">📒</span> 帳本
        </a>

        <!-- 即時時鐘 -->
        <div class="time-display">
            <div class="dot"></div>
            <span id="clock">時間載入中...</span>
        </div>
    </div>

    <script>
        // 即時時鐘的 JavaScript
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-TW', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('clock').innerText = "當前時間：" + timeString;
        }
        // 每秒更新一次時間
        setInterval(updateClock, 1000);
        updateClock(); // 初始化馬上執行一次
    </script>
</body>
</html>
