<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #121212;
            --card: #1C1C1E;
            --text: #F2F2F7;
            --muted: #8E8E93;
            --p1-color: #00ff88; /* 至凱的專屬霓虹綠 */
            --p2-color: #00e5ff; /* 柏致的專屬霓虹藍 */
        }
        
        * { box-sizing: border-box; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            /* 加上微微的頂部漸層光暈，增加質感 */
            background: radial-gradient(circle at top, #2a2a35 0%, #121212 50%);
        }

        /* 登入卡片主體 */
        .login-card {
            background: var(--card);
            border: 1px solid #2C2C2E;
            border-radius: 24px;
            padding: 28px 22px 24px;
            width: 100%;
            max-width: 360px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 浮動的月亮圖示 */
        .icon-wrapper {
            font-size: 48px;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
            100% { transform: translateY(0px); }
        }

        h1 {
            font-size: 24px;
            margin: 0 0 10px 0;
            font-weight: 800;
            letter-spacing: 1.5px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* 大按鈕設計 */
        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 15px;
            border-radius: 14px;
            text-decoration: none;
            font-size: 15px;
            font-weight: bold;
            margin-bottom: 10px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .btn:hover { transform: translateY(-3px); filter: brightness(1.18); }
        .btn:active { transform: scale(0.96) translateY(0); }

        /* 至凱專屬按鈕 */
        .btn-p1 {
            background: rgba(0, 255, 136, 0.08);
            border: 1px solid rgba(0, 255, 136, 0.4);
            color: var(--p1-color);
        }
        .btn-p1:hover { box-shadow: 0 8px 24px rgba(0, 255, 136, 0.18); border-color: rgba(0,255,136,0.65); }

        /* 柏致專屬按鈕 */
        .btn-p2 {
            background: rgba(0, 229, 255, 0.08);
            border: 1px solid rgba(0, 229, 255, 0.4);
            color: var(--p2-color);
        }
        .btn-p2:hover { box-shadow: 0 8px 24px rgba(0, 229, 255, 0.18); border-color: rgba(0,229,255,0.65); }

        /* 宿舍帳本按鈕 */
        .btn-split {
            background: rgba(255, 159, 10, 0.08);
            border: 1px solid rgba(255, 159, 10, 0.4);
            color: #FF9F0A;
            margin-top: 8px;
        }
        .btn-split:hover { box-shadow: 0 8px 24px rgba(255, 159, 10, 0.18); border-color: rgba(255,159,10,0.65); }

        /* 即時時鐘設計 */
        .time-display {
            margin-top: 16px;
            font-size: 14px;
            font-weight: 600;
            color: var(--muted);
            background: #000;
            padding: 10px 20px;
            border-radius: 20px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #2C2C2E;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            background-color: var(--p1-color);
            border-radius: 50%;
            animation: blink 1s infinite alternate;
        }

        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 8px var(--p1-color); }
            to { opacity: 0.2; box-shadow: none; }
        }

        /* 公告條 */
        .anno-card {
            display: none;
            align-items: center;
            gap: 10px;
            width: 100%;
            max-width: 360px;
            padding: 11px 14px 11px 18px;
            border-radius: 14px;
            background: rgba(14, 16, 26, 0.72);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(123,156,255,0.25);
            margin-bottom: 12px;
            animation: slideUp 0.5s ease-out;
            position: relative;
            overflow: hidden;
        }
        .anno-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--anno-accent, #7B9CFF);
            border-radius: 0 2px 2px 0;
        }
        .anno-signal {
            display: flex;
            gap: 3px;
            align-items: center;
            flex-shrink: 0;
        }
        .anno-signal span {
            display: block;
            width: 5px; height: 5px;
            border-radius: 50%;
            background: var(--anno-accent, #7B9CFF);
            animation: pulse-dot 1.4s ease-in-out infinite;
        }
        .anno-signal span:nth-child(2) { animation-delay: 0.2s; opacity: 0.55; width: 4px; height: 4px; }
        .anno-signal span:nth-child(3) { animation-delay: 0.4s; opacity: 0.3;  width: 3px; height: 3px; }
        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }
        .anno-icon { font-size: 18px; flex-shrink: 0; }
        .anno-content { flex: 1; min-width: 0; text-align: left; }
        .anno-title {
            font-weight: 700;
            font-size: 13px;
            color: #EEEEF8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .anno-text {
            font-size: 11px;
            color: rgba(238,238,248,0.55);
            line-height: 1.4;
            margin-top: 2px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .anno-date {
            font-size: 10px;
            color: var(--muted);
            flex-shrink: 0;
            align-self: flex-start;
        }
    </style>
</head>
<body>

    <!-- 公告條 -->
    <div class="anno-card" id="anno-card">
        <div class="anno-signal"><span></span><span></span><span></span></div>
        <div class="anno-icon" id="anno-icon">📢</div>
        <div class="anno-content">
            <div class="anno-title" id="anno-title"></div>
            <div class="anno-text" id="anno-text"></div>
        </div>
        <div class="anno-date" id="anno-date"></div>
    </div>

    <div class="login-card">
        <div class="icon-wrapper">🏠</div>
        <h1>宿舍系統</h1>
        <div class="subtitle">請選擇您的專屬身分登入<br>每日 00:00 - 02:00 準時打卡</div>

        <!-- 至凱的入口 -->
        <a href="player.html?player=p1" class="btn btn-p1">
            <span style="font-size: 22px;">👦🏻</span> 至凱 的睡眠金庫
        </a>

        <!-- 柏致的入口 -->
        <a href="player.html?player=p2" class="btn btn-p2">
            <span style="font-size: 22px;">👦🏼</span> 柏致 的睡眠金庫
        </a>

        <!-- 帳本入口 -->
        <a href="split.html" class="btn btn-split">
            <span style="font-size: 22px;">📒</span> 帳本
        </a>

        <!-- 即時時鐘 -->
        <div class="time-display">
            <div class="dot"></div>
            <span id="clock">時間載入中...</span>
        </div>
    </div>

    <script>
        // Firebase 公告監聽
        const firebaseConfig = { apiKey: "AIzaSyArUT_yPRn3CR9ejNbp8ycYGjP6gHPPKJA", authDomain: "gymsleep-e99d9.firebaseapp.com", databaseURL: "https://gymsleep-e99d9-default-rtdb.firebaseio.com/", projectId: "gymsleep-e99d9", storageBucket: "gymsleep-e99d9.firebasestorage.app", messagingSenderId: "346919034740", appId: "1:346919034740:web:3399498d40359c10b61621" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('system/announcement').on('value', snap => {
            const d = snap.val();
            const card = document.getElementById('anno-card');
            if (d && d.is_active) {
                document.getElementById('anno-title').innerText = d.title || '';
                document.getElementById('anno-text').innerText = d.text || '';
                document.getElementById('anno-date').innerText = d.date || '';
                let icon, accent;
                if (d.type === 'event') {
                    icon = '🔥'; accent = '#F0C040';
                } else if (d.type === 'update') {
                    icon = '✨'; accent = '#4ADE80';
                } else {
                    icon = '📢'; accent = '#7B9CFF';
                }
                document.getElementById('anno-icon').innerText = icon;
                card.style.setProperty('--anno-accent', accent);
                card.style.display = 'flex';
            } else {
                card.style.display = 'none';
            }
        });

        // 即時時鐘的 JavaScript
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('zh-TW', { 
                hour12: false, 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit' 
            });
            document.getElementById('clock').innerText = "當前時間：" + timeString;
        }
        // 每秒更新一次時間
        setInterval(updateClock, 1000);
        updateClock(); // 初始化馬上執行一次
    </script>
</body>
</html>
