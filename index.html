<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #1E1912;
            --card: #2C2418;
            --border: rgba(200,160,100,0.22);
            --text: #F2EBD8;
            --muted: #9E8F7C;
            --p1: #8DC87A;
            --p2: #7ABBC8;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at top, #302818 0%, #1E1912 60%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 32px;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            max-width: 420px;
            padding: 28px 20px 0;
            text-align: center;
        }
        .header-icon {
            font-size: 44px;
            animation: float 3s ease-in-out infinite;
            display: block;
            margin-bottom: 10px;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .header-title {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .header-sub {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .time-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(200,160,100,0.06);
            border: 1px solid var(--border);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--p1);
            animation: blink 1s infinite alternate;
            flex-shrink: 0;
        }
        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 5px var(--p1); }
            to   { opacity: 0.3; box-shadow: none; }
        }

        /* ── Announcement ── */
        .anno-card {
            display: none;
            width: calc(100% - 40px);
            max-width: 420px;
            margin: 16px 0 0;
            padding: 12px 16px 12px 20px;
            border-radius: 14px;
            background: rgba(28,22,14,0.88);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(200,160,100,0.2);
            position: relative;
            overflow: hidden;
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .anno-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--anno-accent, #BF8F42);
            border-radius: 0 2px 2px 0;
        }
        .anno-inner { display: flex; align-items: flex-start; gap: 10px; }
        .anno-icon  { font-size: 18px; flex-shrink: 0; }
        .anno-title { font-weight: 700; font-size: 13px; color: var(--text); }
        .anno-text  { font-size: 12px; color: rgba(239,232,216,0.6); line-height: 1.5; margin-top: 2px; }
        .anno-date  { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; padding-left: 8px; }

        /* ── Section label ── */
        .section {
            width: calc(100% - 40px);
            max-width: 420px;
            margin-top: 22px;
        }
        .section-label {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        /* ── Player cards (side by side) ── */
        .player-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid var(--border);
            background: rgba(44,36,22,0.70);
            transition: all 0.2s;
            gap: 8px;
        }
        .player-card:hover  { transform: translateY(-4px); filter: brightness(1.12); }
        .player-card:active { transform: scale(0.97); }
        .player-card .p-ico  { font-size: 38px; }
        .player-card .p-name { font-size: 16px; font-weight: 900; }
        .player-card .p-sub  { font-size: 11px; color: var(--muted); }
        .card-p1 { border-color: rgba(141,200,122,0.3); color: var(--p1); }
        .card-p1:hover { box-shadow: 0 8px 24px rgba(141,200,122,0.12); border-color: rgba(141,200,122,0.5); }
        .card-p2 { border-color: rgba(122,187,200,0.3); color: var(--p2); }
        .card-p2:hover { box-shadow: 0 8px 24px rgba(122,187,200,0.12); border-color: rgba(122,187,200,0.5); }

        /* ── Hover Dashboard Panel ── */
        .hp-panel {
            position: absolute;
            bottom: calc(100% + 8px);
            left: -1px; right: -1px;
            background: rgba(20,16,10,0.97);
            border: 1px solid rgba(200,160,100,0.28);
            border-radius: 16px;
            padding: 10px 14px;
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
            transition: max-height 0.42s cubic-bezier(0.4,0,0.2,1),
                        opacity   0.30s ease,
                        transform 0.36s cubic-bezier(0.4,0,0.2,1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 20;
            box-shadow: 0 -6px 28px rgba(0,0,0,0.5);
        }
        .player-card:hover .hp-panel {
            max-height: 200px;
            opacity: 1;
            transform: translateY(0);
        }
        .hp-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 0;
            border-bottom: 1px solid rgba(200,160,100,0.08);
            font-size: 12px;
            gap: 8px;
        }
        .hp-row:last-child { border-bottom: none; }
        .hp-lbl { color: var(--muted); font-weight: 500; white-space: nowrap; }
        .hp-val { font-weight: 700; color: var(--text); text-align: right; }

        /* ── Feature grid (2×2) ── */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .feature-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            border: 1px solid var(--border);
            background: rgba(44,36,22,0.70);
            transition: all 0.2s;
            gap: 6px;
        }
        .feature-card:hover  { transform: translateY(-3px); filter: brightness(1.12); }
        .feature-card:active { transform: scale(0.97); }
        .feature-card .f-ico  { font-size: 28px; }
        .feature-card .f-name { font-size: 14px; font-weight: 800; }
        .feature-card .f-sub  { font-size: 11px; color: var(--muted); line-height: 1.4; }

        .feat-split    { border-color: rgba(200,164,74,0.3);  color: #C8A44A; }
        .feat-split:hover  { box-shadow: 0 6px 20px rgba(200,164,74,0.12); border-color: rgba(200,164,74,0.5); }
        .feat-grip     { border-color: rgba(196,140,80,0.3);  color: #C48C50; }
        .feat-grip:hover   { box-shadow: 0 6px 20px rgba(196,140,80,0.12); border-color: rgba(196,140,80,0.5); }
        /* ── Changelog button ── */
        .changelog-btn {
            position: relative;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--muted);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }
        .changelog-btn:hover { color: var(--text); border-color: rgba(200,160,100,0.45); background: rgba(200,160,100,0.06); }
        .changelog-dot {
            position: absolute;
            top: -3px; right: -3px;
            width: 9px; height: 9px;
            background: #C47070;
            border-radius: 50%;
            border: 2px solid #1E1912;
            display: none;
            animation: dotPulse 1.8s ease-in-out infinite;
        }
        @keyframes dotPulse {
            0%,100% { box-shadow: 0 0 0 0 rgba(196,112,112,0.5); }
            50% { box-shadow: 0 0 0 4px rgba(196,112,112,0); }
        }
        .changelog-dot.show { display: block; }

        /* ── Changelog bottom sheet ── */
        .cl-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(6px);
            z-index: 500;
            align-items: flex-end;
            justify-content: center;
        }
        .cl-overlay.open { display: flex; }
        .cl-sheet {
            width: 100%; max-width: 480px;
            max-height: 78vh;
            background: #2C2418;
            border-radius: 24px 24px 0 0;
            border: 1px solid rgba(200,160,100,0.25);
            border-bottom: none;
            display: flex;
            flex-direction: column;
            animation: sheetUp 0.3s cubic-bezier(0.25,0.8,0.25,1);
        }
        @keyframes sheetUp {
            from { transform: translateY(100%); opacity: 0.6; }
            to   { transform: translateY(0);    opacity: 1; }
        }
        .cl-handle {
            width: 38px; height: 4px;
            background: rgba(200,160,100,0.25);
            border-radius: 2px;
            margin: 12px auto 0;
            flex-shrink: 0;
        }
        .cl-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px 12px;
            border-bottom: 1px solid rgba(200,160,100,0.18);
            flex-shrink: 0;
        }
        .cl-title { font-size: 15px; font-weight: 800; letter-spacing: 0.5px; }
        .cl-close {
            font-size: 18px; color: var(--muted); cursor: pointer;
            background: none; border: none; padding: 4px 6px; line-height: 1;
            border-radius: 8px; transition: background 0.15s;
        }
        .cl-close:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .cl-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 32px;
            display: flex;
            flex-direction: column;
            gap: 0;
        }
        .cl-entry { padding: 14px 0; }
        .cl-version-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }
        .cl-ver-badge {
            font-size: 11px; font-weight: 800;
            padding: 3px 10px; border-radius: 10px;
            background: rgba(191,143,66,0.15);
            border: 1px solid rgba(191,143,66,0.35);
            color: #C8A44A;
        }
        .cl-date { font-size: 11px; color: var(--muted); }
        .cl-new-badge {
            font-size: 10px; font-weight: 800;
            padding: 2px 8px; border-radius: 8px;
            background: rgba(196,112,112,0.15);
            color: #C47070;
            border: 1px solid rgba(196,112,112,0.3);
            letter-spacing: 0.3px;
        }
        .cl-group { margin-bottom: 10px; }
        .cl-group-title {
            font-size: 12px; font-weight: 700;
            color: var(--muted);
            margin-bottom: 6px;
            display: flex; align-items: center; gap: 5px;
        }
        .cl-items { list-style: none; display: flex; flex-direction: column; gap: 5px; }
        .cl-item {
            font-size: 13px;
            color: rgba(242,235,216,0.82);
            padding-left: 14px;
            position: relative;
            line-height: 1.5;
        }
        .cl-item::before { content: '·'; position: absolute; left: 4px; color: var(--muted); }
        .cl-divider { height: 1px; background: rgba(200,160,100,0.14); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <span class="header-icon">🏠</span>
        <div class="header-title">宿舍系統</div>
        <div class="header-sub">每日 00:00 – 02:00 準時打卡</div>
        <div class="time-pill">
            <div class="dot"></div>
            <span id="clock">載入中...</span>
        </div>
        <div style="display:flex; gap:8px; align-items:center;">
            <button class="changelog-btn" onclick="openChangelog()">
                📋 更新記錄
                <span class="changelog-dot" id="cl-dot"></span>
            </button>
        </div>
    </div>

    <!-- Announcement -->
    <div class="anno-card" id="anno-card">
        <div class="anno-inner">
            <div class="anno-icon" id="anno-icon">📢</div>
            <div style="flex:1; min-width:0;">
                <div class="anno-title" id="anno-title"></div>
                <div class="anno-text"  id="anno-text"></div>
            </div>
            <div class="anno-date" id="anno-date"></div>
        </div>
    </div>

    <!-- Player section -->
    <div class="section">
        <div class="section-label">選擇身分</div>
        <div class="player-grid">
            <a href="player.html?player=p1" class="player-card card-p1">
                <div class="hp-panel" id="hp-p1">
                    <div class="hp-row"><span class="hp-lbl">💰 點數</span><span class="hp-val" id="hp-pts-p1">—</span></div>
                    <div class="hp-row"><span class="hp-lbl">🔥 連勝</span><span class="hp-val" id="hp-str-p1">—</span></div>
                    <div class="hp-row"><span class="hp-lbl">💌 未讀</span><span class="hp-val" id="hp-mail-p1">—</span></div>
                </div>
                <div class="p-ico">👦🏻</div>
                <div class="p-name">至凱</div>
                <div class="p-sub">睡眠金庫</div>
            </a>
            <a href="player.html?player=p2" class="player-card card-p2">
                <div class="hp-panel" id="hp-p2">
                    <div class="hp-row"><span class="hp-lbl">💰 點數</span><span class="hp-val" id="hp-pts-p2">—</span></div>
                    <div class="hp-row"><span class="hp-lbl">🔥 連勝</span><span class="hp-val" id="hp-str-p2">—</span></div>
                    <div class="hp-row"><span class="hp-lbl">💌 未讀</span><span class="hp-val" id="hp-mail-p2">—</span></div>
                </div>
                <div class="p-ico">👦🏼</div>
                <div class="p-name">柏致</div>
                <div class="p-sub">睡眠金庫</div>
            </a>
        </div>
    </div>

    <!-- Feature section -->
    <div class="section">
        <div class="section-label">功能</div>
        <div class="feature-grid">
            <a href="split.html" class="feature-card feat-split">
                <div class="f-ico">📒</div>
                <div class="f-name">帳本</div>
                <div class="f-sub">宿舍費用分帳</div>
            </a>
            <a href="grip.html" class="feature-card feat-grip">
                <div class="f-ico">🤜</div>
                <div class="f-name">握力日記</div>
                <div class="f-sub">訓練紀錄與趨勢</div>
            </a>
        </div>
    </div>

    <!-- Changelog bottom sheet -->
    <div class="cl-overlay" id="cl-overlay">
        <div class="cl-sheet">
            <div class="cl-handle"></div>
            <div class="cl-header">
                <div class="cl-title">📋 更新記錄</div>
                <button class="cl-close" onclick="closeChangelog()">✕</button>
            </div>
            <div class="cl-scroll" id="cl-scroll"></div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyArUT_yPRn3CR9ejNbp8ycYGjP6gHPPKJA", authDomain: "gymsleep-e99d9.firebaseapp.com", databaseURL: "https://gymsleep-e99d9-default-rtdb.firebaseio.com/", projectId: "gymsleep-e99d9", storageBucket: "gymsleep-e99d9.firebasestorage.app", messagingSenderId: "346919034740", appId: "1:346919034740:web:3399498d40359c10b61621" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('system/announcement').on('value', snap => {
            const d = snap.val();
            const card = document.getElementById('anno-card');
            if (d && d.is_active) {
                document.getElementById('anno-title').innerText = d.title || '';
                document.getElementById('anno-text').innerText  = d.text  || '';
                document.getElementById('anno-date').innerText  = d.date  || '';
                const map = { event:['🔥','#C8A44A'], update:['✨','#76A668'] };
                const [icon, accent] = map[d.type] || ['📢','#BF8F42'];
                document.getElementById('anno-icon').innerText = icon;
                card.style.setProperty('--anno-accent', accent);
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();

                            '新增「獎池機率一覽」按鈕，清楚標示可抽與不可抽道具',
                            '單抽新增神秘動畫：浮動問號＋蓄力音效＋閃光揭曉',
                            '10 連抽全面放慢：前搖 800ms、史詩紫色閃光暫停、神話演出延長至 3.2 秒',
                        ]
                    },
                    {
                        icon: '🏪',
                        title: '黑市',
                        items: [
                            '抽獎券每次刷新固定 1 張（原為隨機 1–3 張）',
                        ]
                    }
                ]
            }
        ];

        const LATEST_VER = CHANGELOG[0].version;
        const CL_KEY = 'sb_changelog_read';

        function initChangelog() {
            if (localStorage.getItem(CL_KEY) !== LATEST_VER) {
                document.getElementById('cl-dot').classList.add('show');
            }
        }

        function openChangelog() {
            document.getElementById('cl-overlay').classList.add('open');
            localStorage.setItem(CL_KEY, LATEST_VER);
            document.getElementById('cl-dot').classList.remove('show');
            renderChangelog();
        }

        function closeChangelog() {
            document.getElementById('cl-overlay').classList.remove('open');
        }

        function renderChangelog() {
            const scroll = document.getElementById('cl-scroll');
            scroll.innerHTML = '';
            CHANGELOG.forEach((entry, idx) => {
                const el = document.createElement('div');
                el.className = 'cl-entry';
                el.innerHTML = `
                    <div class="cl-version-bar">
                        <span class="cl-ver-badge">${entry.version}</span>
                        <span class="cl-date">${entry.date}</span>
                        ${entry.isNew ? '<span class="cl-new-badge">NEW</span>' : ''}
                    </div>
                    ${entry.groups.map(g => `
                        <div class="cl-group">
                            <div class="cl-group-title">${g.icon} ${g.title}</div>
                            <ul class="cl-items">
                                ${g.items.map(i => `<li class="cl-item">${i}</li>`).join('')}
                            </ul>
                        </div>
                    `).join('')}
                `;
                scroll.appendChild(el);
                if (idx < CHANGELOG.length - 1) {
                    const hr = document.createElement('div');
                    hr.className = 'cl-divider';
                    scroll.appendChild(hr);
                }
            });
        }

        document.getElementById('cl-overlay').addEventListener('click', e => {
            if (e.target === e.currentTarget) closeChangelog();
        });

        // ── Hover Panel ────────────────────────────────────────
        const _hp = { p1: {}, p2: {} };

        function _updateHoverPanel(p) {
            const d = _hp[p];
            const ptsEl  = document.getElementById(`hp-pts-${p}`);
            const strEl  = document.getElementById(`hp-str-${p}`);
            const mailEl = document.getElementById(`hp-mail-${p}`);
            if (ptsEl)  ptsEl.textContent  = d.points != null ? `${d.points} 點` : '—';
            if (strEl)  strEl.textContent  = d.streak  != null ? `${d.streak} 天`  : '—';
            if (mailEl) mailEl.textContent = d.unread  != null ? (d.unread > 0 ? `${d.unread} 封` : '無') : '—';
        }

        ['p1', 'p2'].forEach(p => {
            db.ref(`economy/${p}`).on('value', s => {
                _hp[p].points = s.val() || 0;
                _updateHoverPanel(p);
            });
            db.ref(`users/${p}/streak`).on('value', s => {
                _hp[p].streak = s.val() || 0;
                _updateHoverPanel(p);
            });
            db.ref(`mailbox/${p}`).on('value', s => {
                let u = 0;
                s.forEach(c => { if (!c.val().claimed) u++; });
                _hp[p].unread = u;
                _updateHoverPanel(p);
            });
        });

        setInterval(() => ['p1', 'p2'].forEach(_updateHoverPanel), 60000);

        initChangelog();
    </script>
</body>
</html>
