<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宿舍系統</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0C0E16;
            --card: #161A28;
            --border: rgba(255,255,255,0.08);
            --text: #EEEEF8;
            --muted: #8890A8;
            --p1: #00ff88;
            --p2: #00e5ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: radial-gradient(ellipse at top, #1a1f35 0%, #0C0E16 55%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 0 32px;
        }

        /* ── Header ── */
        .header {
            width: 100%;
            max-width: 420px;
            padding: 28px 20px 0;
            text-align: center;
        }
        .header-icon {
            font-size: 44px;
            animation: float 3s ease-in-out infinite;
            display: block;
            margin-bottom: 10px;
        }
        @keyframes float {
            0%,100% { transform: translateY(0); }
            50%      { transform: translateY(-10px); }
        }
        .header-title {
            font-size: 26px;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 6px;
        }
        .header-sub {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 16px;
            line-height: 1.6;
        }
        .time-pill {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            padding: 7px 16px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 4px;
        }
        .dot {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--p1);
            animation: blink 1s infinite alternate;
            flex-shrink: 0;
        }
        @keyframes blink {
            from { opacity: 1; box-shadow: 0 0 6px var(--p1); }
            to   { opacity: 0.2; box-shadow: none; }
        }

        /* ── Announcement ── */
        .anno-card {
            display: none;
            width: calc(100% - 40px);
            max-width: 420px;
            margin: 16px 0 0;
            padding: 12px 16px 12px 20px;
            border-radius: 14px;
            background: rgba(14,16,26,0.72);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(123,156,255,0.25);
            position: relative;
            overflow: hidden;
            animation: slideDown 0.4s ease-out;
        }
        @keyframes slideDown {
            from { opacity:0; transform:translateY(-8px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .anno-card::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 3px;
            background: var(--anno-accent, #7B9CFF);
            border-radius: 0 2px 2px 0;
        }
        .anno-inner { display: flex; align-items: flex-start; gap: 10px; }
        .anno-icon  { font-size: 18px; flex-shrink: 0; }
        .anno-title { font-weight: 700; font-size: 13px; color: var(--text); }
        .anno-text  { font-size: 12px; color: rgba(238,238,248,0.6); line-height: 1.5; margin-top: 2px; }
        .anno-date  { font-size: 10px; color: var(--muted); margin-left: auto; flex-shrink: 0; padding-left: 8px; }

        /* ── Section label ── */
        .section {
            width: calc(100% - 40px);
            max-width: 420px;
            margin-top: 22px;
        }
        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 2.5px;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 10px;
        }

        /* ── Player cards (side by side) ── */
        .player-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .player-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 12px;
            border-radius: 20px;
            text-decoration: none;
            border: 1px solid var(--border);
            background: rgba(22,26,42,0.6);
            transition: all 0.2s;
            gap: 8px;
        }
        .player-card:hover  { transform: translateY(-4px); filter: brightness(1.15); }
        .player-card:active { transform: scale(0.97); }
        .player-card .p-ico  { font-size: 38px; }
        .player-card .p-name { font-size: 16px; font-weight: 900; }
        .player-card .p-sub  { font-size: 11px; color: var(--muted); }
        .card-p1 { border-color: rgba(0,255,136,0.3); color: var(--p1); }
        .card-p1:hover { box-shadow: 0 8px 28px rgba(0,255,136,0.15); border-color: rgba(0,255,136,0.55); }
        .card-p2 { border-color: rgba(0,229,255,0.3); color: var(--p2); }
        .card-p2:hover { box-shadow: 0 8px 28px rgba(0,229,255,0.15); border-color: rgba(0,229,255,0.55); }

        /* ── Feature grid (2×2) ── */
        .feature-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .feature-card {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            padding: 16px;
            border-radius: 18px;
            text-decoration: none;
            border: 1px solid var(--border);
            background: rgba(22,26,42,0.6);
            transition: all 0.2s;
            gap: 6px;
        }
        .feature-card:hover  { transform: translateY(-3px); filter: brightness(1.15); }
        .feature-card:active { transform: scale(0.97); }
        .feature-card .f-ico  { font-size: 28px; }
        .feature-card .f-name { font-size: 14px; font-weight: 800; }
        .feature-card .f-sub  { font-size: 11px; color: var(--muted); line-height: 1.4; }

        .feat-split    { border-color: rgba(255,159,10,0.3);  color: #FF9F0A; }
        .feat-split:hover  { box-shadow: 0 6px 20px rgba(255,159,10,0.14); border-color: rgba(255,159,10,0.55); }
        .feat-grip     { border-color: rgba(191,90,242,0.3);  color: #BF5AF2; }
        .feat-grip:hover   { box-shadow: 0 6px 20px rgba(191,90,242,0.14); border-color: rgba(191,90,242,0.55); }
        .feat-exp      { border-color: rgba(248,113,113,0.3); color: #F87171; }
        .feat-exp:hover    { box-shadow: 0 6px 20px rgba(248,113,113,0.14); border-color: rgba(248,113,113,0.55); }
        .feat-company  { border-color: rgba(74,222,128,0.3);  color: #4ADE80; }
        .feat-company:hover { box-shadow: 0 6px 20px rgba(74,222,128,0.14); border-color: rgba(74,222,128,0.55); }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <span class="header-icon">🏠</span>
        <div class="header-title">宿舍系統</div>
        <div class="header-sub">每日 00:00 – 02:00 準時打卡</div>
        <div class="time-pill">
            <div class="dot"></div>
            <span id="clock">載入中...</span>
        </div>
    </div>

    <!-- Announcement -->
    <div class="anno-card" id="anno-card">
        <div class="anno-inner">
            <div class="anno-icon" id="anno-icon">📢</div>
            <div style="flex:1; min-width:0;">
                <div class="anno-title" id="anno-title"></div>
                <div class="anno-text"  id="anno-text"></div>
            </div>
            <div class="anno-date" id="anno-date"></div>
        </div>
    </div>

    <!-- Player section -->
    <div class="section">
        <div class="section-label">選擇身分</div>
        <div class="player-grid">
            <a href="player.html?player=p1" class="player-card card-p1">
                <div class="p-ico">👦🏻</div>
                <div class="p-name">至凱</div>
                <div class="p-sub">睡眠金庫</div>
            </a>
            <a href="player.html?player=p2" class="player-card card-p2">
                <div class="p-ico">👦🏼</div>
                <div class="p-name">柏致</div>
                <div class="p-sub">睡眠金庫</div>
            </a>
        </div>
    </div>

    <!-- Feature section -->
    <div class="section">
        <div class="section-label">功能</div>
        <div class="feature-grid">
            <a href="split.html" class="feature-card feat-split">
                <div class="f-ico">📒</div>
                <div class="f-name">帳本</div>
                <div class="f-sub">宿舍費用分帳</div>
            </a>
            <a href="grip.html" class="feature-card feat-grip">
                <div class="f-ico">🤜</div>
                <div class="f-name">握力日記</div>
                <div class="f-sub">訓練紀錄與趨勢</div>
            </a>
            <a href="expedition.html" class="feature-card feat-exp">
                <div class="f-ico">⚔️</div>
                <div class="f-name">聯合遠征</div>
                <div class="f-sub">雙人冒險投資</div>
            </a>
            <a href="company.html" class="feature-card feat-company">
                <div class="f-ico">🏢</div>
                <div class="f-name">創業模擬</div>
                <div class="f-sub">經營你的公司</div>
            </a>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyArUT_yPRn3CR9ejNbp8ycYGjP6gHPPKJA", authDomain: "gymsleep-e99d9.firebaseapp.com", databaseURL: "https://gymsleep-e99d9-default-rtdb.firebaseio.com/", projectId: "gymsleep-e99d9", storageBucket: "gymsleep-e99d9.firebasestorage.app", messagingSenderId: "346919034740", appId: "1:346919034740:web:3399498d40359c10b61621" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('system/announcement').on('value', snap => {
            const d = snap.val();
            const card = document.getElementById('anno-card');
            if (d && d.is_active) {
                document.getElementById('anno-title').innerText = d.title || '';
                document.getElementById('anno-text').innerText  = d.text  || '';
                document.getElementById('anno-date').innerText  = d.date  || '';
                const map = { event:['🔥','#F0C040'], update:['✨','#4ADE80'] };
                const [icon, accent] = map[d.type] || ['📢','#7B9CFF'];
                document.getElementById('anno-icon').innerText = icon;
                card.style.setProperty('--anno-accent', accent);
                card.style.display = 'block';
            } else {
                card.style.display = 'none';
            }
        });

        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('zh-TW', { hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit' });
        }
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
