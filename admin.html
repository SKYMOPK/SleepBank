<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>管理員後台</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg: #0C0E16;
            --card: #161A28;
            --text: #EEEEF8;
            --muted: #8890A8;
            --border: rgba(255,255,255,0.09);
            --primary: #7B9CFF;
            --green: #4ADE80;
            --red: #F87171;
            --gold: #F0C040;
            --orange: #FFB340;
            --purple: #C084FC;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: radial-gradient(ellipse at top left, #1a1f35 0%, #0C0E16 60%);
            background-attachment: fixed;
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 60px;
        }

        .header {
            background: rgba(20, 24, 42, 0.88);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            padding: 18px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .header-back { color: var(--muted); text-decoration: none; font-size: 14px; font-weight: bold; transition: color 0.2s; }
        .header-back:hover { color: var(--text); }
        .header-title { font-size: 17px; font-weight: 800; letter-spacing: 1.5px; color: var(--primary); }
        .header-sub { font-size: 12px; color: var(--muted); margin-left: auto; }

        .page-wrapper { max-width: 600px; margin: 0 auto; padding: 20px 16px; display: flex; flex-direction: column; gap: 16px; }

        /* ===== Section Card ===== */
        .section-card {
            background: rgba(22, 26, 42, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.09);
            border-radius: 20px;
            overflow: hidden;
        }
        .section-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.07);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            user-select: none;
        }
        .section-header-icon { font-size: 20px; }
        .section-header-title { font-size: 15px; font-weight: 800; flex: 1; }
        .section-chevron { color: var(--muted); font-size: 12px; transition: transform 0.3s; transform: rotate(-90deg); }
        .section-body { padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .section-body.collapsed { display: none; }

        /* ===== Form Elements ===== */
        label { font-size: 12px; color: var(--muted); font-weight: bold; letter-spacing: 1px; display: block; margin-bottom: 6px; }
        input[type="text"], input[type="number"], textarea, select {
            width: 100%; background: rgba(0,0,0,0.25); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 12px 14px; color: var(--text);
            font-size: 14px; outline: none; transition: border-color 0.2s, box-shadow 0.2s;
            font-family: inherit; -webkit-appearance: none; appearance: none;
        }
        input:focus, textarea:focus, select:focus {
            border-color: rgba(123,156,255,0.5);
            box-shadow: 0 0 0 3px rgba(123,156,255,0.08);
        }
        textarea { resize: none; height: 80px; }
        select option { background: #1C2030; }

        /* ===== Type Selector ===== */
        .type-row { display: flex; gap: 8px; flex-wrap: wrap; }
        .type-btn {
            padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03); color: var(--muted);
            font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s;
        }
        .type-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .type-btn.selected { border-color: rgba(123,156,255,0.4); background: rgba(123,156,255,0.12); color: var(--primary); }
        .type-btn.sel-event { border-color: rgba(240,192,64,0.4); background: rgba(240,192,64,0.1); color: var(--gold); }
        .type-btn.sel-update { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.1); color: var(--green); }

        /* ===== Target Selector ===== */
        .target-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
        .target-btn {
            padding: 12px 8px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03); color: var(--muted);
            font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .target-btn:hover { background: rgba(255,255,255,0.07); color: var(--text); }
        .target-btn.selected { border-color: rgba(123,156,255,0.4); background: rgba(123,156,255,0.12); color: var(--primary); }

        /* ===== 道具選擇器 ===== */

        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 8px; max-height: 280px; overflow-y: auto; padding: 2px; }
        .item-option {
            padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.07);
            background: rgba(255,255,255,0.02); cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; gap: 4px; text-align: center;
        }
        .item-option:hover { background: rgba(255,255,255,0.06); }
        .item-option.selected { border-color: rgba(123,156,255,0.45); background: rgba(123,156,255,0.1); }
        .item-option .item-icon { font-size: 24px; }
        .item-option .item-name { font-size: 11px; font-weight: bold; color: var(--text); line-height: 1.3; }
        .item-option .item-rarity { font-size: 10px; color: var(--muted); }

        /* ===== 序號區 ===== */
        .code-row { display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: end; }
        .reward-row { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }

        /* ===== 購物車 ===== */
        .cart-list { display: flex; flex-direction: column; gap: 6px; min-height: 36px; }
        .cart-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 8px 0; }
        .cart-item { display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 8px 10px; }
        .cart-item-icon { font-size: 18px; flex-shrink: 0; }
        .cart-item-name { flex: 1; font-size: 12px; font-weight: bold; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .cart-qty-btn { width: 24px; height: 24px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: var(--text); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .cart-qty-btn:hover { background: rgba(255,255,255,0.12); }
        .cart-qty-val { min-width: 24px; text-align: center; font-size: 13px; font-weight: bold; }
        .cart-remove { background: rgba(248,113,113,0.08); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 4px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; flex-shrink: 0; }
        .cart-remove:hover { background: rgba(248,113,113,0.18); }
        .item-option.in-cart { border-color: rgba(74,222,128,0.4); background: rgba(74,222,128,0.08); }

        /* ===== Button ===== */
        .btn {
            width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04); color: var(--text);
            font-size: 15px; font-weight: bold; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn-primary { background: rgba(123,156,255,0.12); border-color: rgba(123,156,255,0.35); color: var(--primary); }
        .btn-primary:hover { background: rgba(123,156,255,0.2); }
        .btn-green { background: rgba(74,222,128,0.1); border-color: rgba(74,222,128,0.3); color: var(--green); }
        .btn-green:hover { background: rgba(74,222,128,0.18); }
        .btn-red { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.3); color: var(--red); }
        .btn-red:hover { background: rgba(248,113,113,0.15); }
        .btn-gold { background: rgba(240,192,64,0.1); border-color: rgba(240,192,64,0.3); color: var(--gold); }
        .btn-gold:hover { background: rgba(240,192,64,0.18); }
        .btn-sm { width: auto; padding: 10px 16px; font-size: 13px; border-radius: 10px; }
        .btn:active { transform: scale(0.97); }

        /* ===== Toast ===== */
        #toast {
            position: fixed; top: 80px; left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: rgba(20,24,38,0.97); border: 1px solid rgba(255,255,255,0.1);
            border-left: 4px solid var(--green); color: var(--text);
            padding: 14px 24px; border-radius: 12px; font-size: 14px; font-weight: bold;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6); opacity: 0; transition: all 0.3s;
            pointer-events: none; white-space: nowrap; z-index: 9999; backdrop-filter: blur(10px);
        }
        #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ===== Divider ===== */
        .divider { height: 1px; background: rgba(255,255,255,0.06); }

        /* ===== 序號列表 ===== */
        .code-list { display: flex; flex-direction: column; gap: 8px; max-height: 200px; overflow-y: auto; }
        .code-item {
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px; padding: 10px 14px; gap: 10px;
        }
        .code-key { font-family: monospace; font-size: 13px; font-weight: bold; color: var(--gold); letter-spacing: 1px; }
        .code-reward { font-size: 12px; color: var(--muted); }
        .code-used { opacity: 0.4; }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .section-card { animation: fadeInUp 0.35s ease-out both; }
        .section-card:nth-child(2) { animation-delay: 0.05s; }
        .section-card:nth-child(3) { animation-delay: 0.1s; }
        .section-card:nth-child(4) { animation-delay: 0.15s; }
    </style>
</head>
<body>

<div id="toast"></div>

<header class="header">
    <a href="player.html?player=p1" class="header-back">← 返回</a>
    <div class="header-title">🛠️ 管理員後台</div>
    <div class="header-sub">至凱專屬</div>
</header>

<div class="page-wrapper">

    <!-- ===== 玩家狀態總覽 ===== -->
    <div class="section-card">
        <div class="section-header" onclick="toggleSection('overview')">
            <span class="section-header-icon">👥</span>
            <span class="section-header-title">玩家狀態總覽</span>
            <span class="section-chevron" id="chevron-overview">▼</span>
        </div>
        <div class="section-body" id="body-overview">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;" id="overview-grid">
                <div style="text-align:center; color:var(--muted); font-size:13px; padding:20px; grid-column:1/-1;">載入中...</div>
            </div>
            <button class="btn" onclick="loadOverview()" style="width:100%; margin-top:12px; background:rgba(255,255,255,0.05); font-size:13px; padding:10px;">🔄 重新整理</button>
        </div>
    </div>

    <!-- ===== 公告管理 ===== -->
    <div class="section-card">
        <div class="section-header" onclick="toggleSection('anno')">
            <span class="section-header-icon">📢</span>
            <span class="section-header-title">公告管理</span>
            <span class="section-chevron" id="chevron-anno">▼</span>
        </div>
        <div class="section-body collapsed" id="body-anno">
            <div>
                <label>標題</label>
                <input type="text" id="anno-title" placeholder="公告標題" maxlength="30">
            </div>
            <div>
                <label>內容</label>
                <textarea id="anno-text" placeholder="公告內容..." maxlength="150"></textarea>
            </div>
            <div>
                <label>類型</label>
                <div class="type-row">
                    <div class="type-btn selected" data-type="normal" onclick="selectAnnoType(this)">📢 一般</div>
                    <div class="type-btn" data-type="event" onclick="selectAnnoType(this)">🔥 活動</div>
                    <div class="type-btn" data-type="update" onclick="selectAnnoType(this)">✨ 更新</div>
                </div>
            </div>
            <div class="divider"></div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                <button class="btn btn-primary" onclick="publishAnnouncement()">📤 發佈公告</button>
                <button class="btn btn-red" onclick="clearAnnouncement()">🗑️ 撤下公告</button>
            </div>
            <div id="anno-current" style="font-size:12px; color:var(--muted); text-align:center;"></div>
        </div>
    </div>

    <!-- ===== 發放獎勵 ===== -->
    <div class="section-card">
        <div class="section-header" onclick="toggleSection('reward')">
            <span class="section-header-icon">🎁</span>
            <span class="section-header-title">發放獎勵</span>
            <span class="section-chevron" id="chevron-reward">▼</span>
        </div>
        <div class="section-body collapsed" id="body-reward">
            <div>
                <label>對象</label>
                <div class="target-row">
                    <div class="target-btn selected" data-target="p1" onclick="selectTarget('reward', this)">👦🏻 至凱</div>
                    <div class="target-btn" data-target="p2" onclick="selectTarget('reward', this)">👦🏼 柏致</div>
                    <div class="target-btn" data-target="both" onclick="selectTarget('reward', this)">👥 兩人</div>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <div>
                    <label>💰 點數</label>
                    <input type="number" id="reward-points" placeholder="0" min="0" max="9999" value="0">
                </div>
                <div>
                    <label>🔹 造型碎片</label>
                    <input type="number" id="reward-shards" placeholder="0" min="0" max="9999" value="0">
                </div>
                <div>
                    <label>🎟️ 抽獎券</label>
                    <input type="number" id="reward-tickets" placeholder="0" min="0" max="99" value="0">
                </div>
            </div>
            <div>
                <label>🎁 道具（點擊加入清單，可多選）</label>
                <div class="item-grid" id="mail-item-grid" style="margin-top:6px;"></div>
            </div>
            <div>
                <label>已選道具清單</label>
                <div class="cart-list" id="mail-cart"><div class="cart-empty">尚未選擇任何道具</div></div>
            </div>
            <div>
                <label>🎨 解鎖造型（點選即附加）</label>
                <div class="item-grid" id="mail-cosm-grid" style="margin-top:6px;"></div>
            </div>
            <div>
                <label>信件說明（選填）</label>
                <input type="text" id="reward-note" placeholder="例：活動獎勵" maxlength="30">
            </div>
            <button class="btn btn-gold" onclick="sendReward()">📨 發送至信箱</button>
        </div>
    </div>

    <!-- ===== 序號管理 ===== -->
    <div class="section-card">
        <div class="section-header" onclick="toggleSection('codes')">
            <span class="section-header-icon">🎟️</span>
            <span class="section-header-title">序號管理</span>
            <span class="section-chevron" id="chevron-codes">▼</span>
        </div>
        <div class="section-body collapsed" id="body-codes">
            <div>
                <label>序號</label>
                <div class="code-row">
                    <input type="text" id="code-key" placeholder="例：SLEEP2025" maxlength="20" style="text-transform:uppercase;">
                    <button class="btn btn-sm" onclick="genCode()" style="white-space:nowrap;">🎲 隨機</button>
                </div>
            </div>
            <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
                <div>
                    <label>💰 點數</label>
                    <input type="number" id="code-points" placeholder="0" min="0" max="9999" value="0">
                </div>
                <div>
                    <label>🔹 造型碎片</label>
                    <input type="number" id="code-shards" placeholder="0" min="0" max="9999" value="0">
                </div>
                <div>
                    <label>🎟️ 抽獎券</label>
                    <input type="number" id="code-tickets" placeholder="0" min="0" max="99" value="0">
                </div>
            </div>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <label>🎁 道具（選填，點擊加入清單，可多選）</label>
                <div class="item-grid" id="code-item-grid"></div>
                <label>已選道具清單</label>
                <div class="cart-list" id="code-cart"><div class="cart-empty">尚未選擇任何道具</div></div>
            </div>
            <div>
                <label>使用次數上限（0 = 無限）</label>
                <input type="number" id="code-max-uses" placeholder="0" min="0" value="1">
            </div>
            <button class="btn btn-primary" onclick="createCode()">➕ 建立序號</button>

            <div class="divider"></div>
            <label>現有序號</label>
            <div class="code-list" id="code-list"><div style="color:var(--muted); font-size:13px; text-align:center;">載入中...</div></div>
        </div>
    </div>

    <!-- ===== 信件管理（收回）===== -->
    <div class="section-card">
        <div class="section-header" onclick="toggleSection('mails')">
            <span class="section-header-icon">📬</span>
            <span class="section-header-title">信件管理（收回）</span>
            <span class="section-chevron" id="chevron-mails">▼</span>
        </div>
        <div class="section-body collapsed" id="body-mails">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:4px;">
                <div class="target-btn selected" data-mp="p1" onclick="selectMailPlayer(this)">👦🏻 至凱</div>
                <div class="target-btn" data-mp="p2" onclick="selectMailPlayer(this)">👦🏼 柏致</div>
            </div>
            <div class="code-list" id="mail-manage-list"><div style="color:var(--muted); font-size:13px; text-align:center;">載入中...</div></div>
        </div>
    </div>


</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyArUT_yPRn3CR9ejNbp8ycYGjP6gHPPKJA", authDomain: "gymsleep-e99d9.firebaseapp.com", databaseURL: "https://gymsleep-e99d9-default-rtdb.firebaseio.com/", projectId: "gymsleep-e99d9", storageBucket: "gymsleep-e99d9.firebasestorage.app", messagingSenderId: "346919034740", appId: "1:346919034740:web:3399498d40359c10b61621" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ITEMS = {
        point_thief: { n: "點數小偷",  i: "🦹", t: "u", d: "偷取對手20%的點數" },
        style_shard: { n: "造型碎片袋", i: "✨", t: "u", d: "隨機獲得 1~3 個造型碎片" },
        heart_quest: { n: "心之所向",  i: "🎯", t: "u", d: "啟動5天準時打卡任務，完成獲得碎片" },
        iron_wall:   { n: "銅牆鐵壁",  i: "🛡️", t: "u", d: "被動護盾，自動阻擋一次點數小偷" },
        dual_exp:    { n: "雙重體驗",  i: "💫", t: "u", d: "當日雙方都打卡，各獲得 10 點" },
        point_burn:  { n: "點數燃燒",  i: "🔥", t: "u", d: "給對手發布消費任務" },
    };

    const COSMETICS = {
        cat_color:    { n: "貓咪萌系・主題色",   i: "🎨", limited: true  },
        cat_effect:   { n: "貓咪萌系・打卡特效", i: "🐱", limited: true  },
        cat_message:  { n: "貓咪萌系・訊息樣式", i: "💬", limited: true  },
        star_color:   { n: "深夜星空・主題色",   i: "🌌", limited: false },
        star_effect:  { n: "深夜星空・打卡特效", i: "🌠", limited: false },
        star_message: { n: "深夜星空・訊息樣式", i: "🌙", limited: false },
    };

    // ===== 工具 =====
    function showToast(msg, color = 'var(--green)') {
        const el = document.getElementById('toast');
        el.innerText = msg; el.style.borderLeftColor = color;
        el.classList.add('show');
        setTimeout(() => el.classList.remove('show'), 2500);
    }

    function toggleSection(id) {
        const body = document.getElementById('body-' + id);
        const chev = document.getElementById('chevron-' + id);
        const collapsed = body.classList.toggle('collapsed');
        chev.style.transform = collapsed ? 'rotate(-90deg)' : 'rotate(0deg)';
    }

    // ===== 公告 =====
    let annoType = 'normal';
    function selectAnnoType(el) {
        document.querySelectorAll('#body-anno .type-btn').forEach(b => b.classList.remove('selected', 'sel-event', 'sel-update'));
        el.classList.add('selected');
        annoType = el.dataset.type;
    }

    function publishAnnouncement() {
        const title = document.getElementById('anno-title').value.trim();
        const text = document.getElementById('anno-text').value.trim();
        if (!title) return showToast('請填寫標題', 'var(--red)');
        if (!text) return showToast('請填寫內容', 'var(--red)');
        const now = new Date();
        const dateStr = `${now.getMonth()+1}/${now.getDate()} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        db.ref('system/announcement').set({ is_active: true, title, text, type: annoType, date: dateStr });
        showToast('📢 公告已發佈！');
        document.getElementById('anno-current').innerText = `目前公告：${title}`;
    }

    function clearAnnouncement() {
        db.ref('system/announcement/is_active').set(false);
        showToast('公告已撤下', 'var(--muted)');
        document.getElementById('anno-current').innerText = '目前沒有公告';
    }

    db.ref('system/announcement').once('value', snap => {
        const d = snap.val();
        const el = document.getElementById('anno-current');
        if (d && d.is_active) el.innerText = `目前公告：${d.title}`;
        else el.innerText = '目前沒有公告';
    });

    // ===== 對象選擇 =====
    const targetState = { reward: 'p1' };
    function selectTarget(section, el) {
        el.closest('.target-row').querySelectorAll('.target-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        targetState[section] = el.dataset.target;
    }

    // ===== 購物車 =====
    const carts = { mail: {}, code: {} };

    function addToCart(type, key) {
        carts[type][key] = (carts[type][key] || 0) + 1;
        renderCart(type);
        renderItemGridCart(type === 'mail' ? 'mail-item-grid' : 'code-item-grid', type);
    }

    function removeFromCart(type, key) {
        delete carts[type][key];
        renderCart(type);
        renderItemGridCart(type === 'mail' ? 'mail-item-grid' : 'code-item-grid', type);
    }

    function adjustCartQty(type, key, delta) {
        carts[type][key] = (carts[type][key] || 0) + delta;
        const removed = carts[type][key] <= 0;
        if (removed) delete carts[type][key];
        renderCart(type);
        if (removed) renderItemGridCart(type === 'mail' ? 'mail-item-grid' : 'code-item-grid', type);
    }

    function renderCart(type) {
        const el = document.getElementById(type === 'mail' ? 'mail-cart' : 'code-cart');
        const entries = Object.entries(carts[type]);
        if (!entries.length) { el.innerHTML = '<div class="cart-empty">尚未選擇任何道具</div>'; return; }
        el.innerHTML = entries.map(([k, qty]) => {
            const it = ITEMS[k];
            return `<div class="cart-item">
                <span class="cart-item-icon">${it.i}</span>
                <span class="cart-item-name">${it.n}</span>
                <button class="cart-qty-btn" onclick="adjustCartQty('${type}','${k}',-1)">−</button>
                <span class="cart-qty-val">${qty}</span>
                <button class="cart-qty-btn" onclick="adjustCartQty('${type}','${k}',1)">+</button>
                <button class="cart-remove" onclick="removeFromCart('${type}','${k}')">✕</button>
            </div>`;
        }).join('');
    }

    // ===== 道具網格（購物車模式）=====
    function renderItemGridCart(gridId, cartType) {
        const grid = document.getElementById(gridId);
        grid.innerHTML = Object.entries(ITEMS).map(([k, v]) => `
            <div class="item-option ${carts[cartType][k] ? 'in-cart' : ''}" onclick="addToCart('${cartType}', '${k}')">
                <span class="item-icon">${v.i}</span>
                <span class="item-name">${v.n}</span>
                <span class="item-rarity">道具${carts[cartType][k] ? ' ✓' : ''}</span>
            </div>`).join('');
    }

    // 造型網格（信件用，多選切換）
    const selectedCosmetics = { mail: new Set() };
    function renderCosmGrid(gridId) {
        const grid = document.getElementById(gridId);
        if (!grid) return;
        grid.innerHTML = Object.entries(COSMETICS).map(([k, c]) => {
            const sel = selectedCosmetics.mail.has(k);
            return `<div class="item-option ${sel ? 'in-cart' : ''}" onclick="toggleCosm('${k}')">
                <span class="item-icon">${c.i}</span>
                <span class="item-name">${c.n.split('・')[1]||c.n}</span>
                <span class="item-rarity">${c.limited ? '✦ 限定' : '◈ 常駐'}${sel ? ' ✓' : ''}</span>
            </div>`;
        }).join('');
    }
    function toggleCosm(key) {
        if (selectedCosmetics.mail.has(key)) selectedCosmetics.mail.delete(key);
        else selectedCosmetics.mail.add(key);
        renderCosmGrid('mail-cosm-grid');
    }

    // ===== 發放獎勵 =====
    function buildRewardMsg(pts, shards, tickets, items, cosms) {
        const parts = [];
        if (pts > 0) parts.push(`${pts} 點`);
        if (shards > 0) parts.push(`${shards} 碎片`);
        if (tickets > 0) parts.push(`🎟️ 抽獎券 x${tickets}`);
        Object.entries(items).forEach(([k, qty]) => { const it = ITEMS[k]; if (it) parts.push(`${it.i}${it.n} x${qty}`); });
        if (cosms && cosms.length) cosms.forEach(k => { const c = COSMETICS[k]; if (c) parts.push(`🎨${c.n}`); });
        return '管理員發放：' + (parts.join('、') || '（空）');
    }

    function sendReward() {
        const pts = parseInt(document.getElementById('reward-points').value) || 0;
        const shards = parseInt(document.getElementById('reward-shards').value) || 0;
        const tickets = parseInt(document.getElementById('reward-tickets').value) || 0;
        const note = document.getElementById('reward-note').value.trim() || '管理員發放';
        const hasItems = Object.keys(carts.mail).length > 0;
        const cosms = [...selectedCosmetics.mail];
        if (pts === 0 && shards === 0 && tickets === 0 && !hasItems && cosms.length === 0) return showToast('請至少填入一項內容', 'var(--red)');
        const targets = targetState.reward === 'both' ? ['p1', 'p2'] : [targetState.reward];
        const now = Date.now();
        const mailData = { title: note, msg: buildRewardMsg(pts, shards, tickets, carts.mail, cosms), timestamp: now, claimed: false };
        if (pts > 0) mailData.points = pts;
        if (shards > 0) mailData.shards = shards;
        if (tickets > 0) mailData.tickets = tickets;
        if (hasItems) mailData.items = { ...carts.mail };
        if (cosms.length) mailData.cosmetics = cosms;
        targets.forEach(p => { db.ref('mailbox/' + p).push(mailData); });
        showToast(`✅ 已發送：${buildRewardMsg(pts, shards, tickets, carts.mail, cosms).replace('管理員發放：', '')}`);
        carts.mail = {};
        selectedCosmetics.mail.clear();
        renderCart('mail');
        renderItemGridCart('mail-item-grid', 'mail');
        renderCosmGrid('mail-cosm-grid');
        document.getElementById('reward-points').value = '0';
        document.getElementById('reward-shards').value = '0';
        document.getElementById('reward-tickets').value = '0';
        document.getElementById('reward-note').value = '';
    }

    // ===== 序號 =====
    function genCode() {
        const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
        let code = '';
        for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)];
        document.getElementById('code-key').value = code;
    }

    function createCode() {
        const key = document.getElementById('code-key').value.trim().toUpperCase();
        if (!key) return showToast('請輸入序號', 'var(--red)');
        const maxUses = parseInt(document.getElementById('code-max-uses').value) || 0;
        const pts = parseInt(document.getElementById('code-points').value) || 0;
        const shards = parseInt(document.getElementById('code-shards').value) || 0;
        const tickets = parseInt(document.getElementById('code-tickets').value) || 0;
        const hasItems = Object.keys(carts.code).length > 0;
        if (pts === 0 && shards === 0 && tickets === 0 && !hasItems) return showToast('請至少填入一項內容', 'var(--red)');
        const reward = {};
        if (pts > 0) reward.points = pts;
        if (shards > 0) reward.shards = shards;
        if (tickets > 0) reward.tickets = tickets;
        if (hasItems) reward.items = { ...carts.code };
        db.ref('gift_codes/' + key).set({ reward, max_uses: maxUses, used_count: 0, created: Date.now() });
        showToast(`✅ 序號 ${key} 已建立！`);
        document.getElementById('code-key').value = '';
        document.getElementById('code-points').value = '0';
        document.getElementById('code-shards').value = '0';
        document.getElementById('code-tickets').value = '0';
        carts.code = {};
        renderCart('code');
        renderItemGridCart('code-item-grid', 'code');
    }

    function deleteCode(key) {
        if (!confirm(`確定刪除序號 ${key}？`)) return;
        db.ref('gift_codes/' + key).remove();
        showToast('🗑️ 序號已刪除', 'var(--muted)');
    }

    db.ref('gift_codes').on('value', snap => {
        const data = snap.val() || {};
        const list = document.getElementById('code-list');
        const entries = Object.entries(data).sort((a, b) => (b[1].created || 0) - (a[1].created || 0));
        if (!entries.length) { list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center;">目前沒有序號</div>'; return; }
        list.innerHTML = entries.map(([k, v]) => {
            const isUsed = v.max_uses > 0 && v.used_count >= v.max_uses;
            const rw = v.reward || {};
            const parts = [];
            if (rw.points) parts.push(`💰 ${rw.points} 點`);
            if (rw.shards) parts.push(`🔹 ${rw.shards} 碎片`);
            if (rw.tickets) parts.push(`🎟️ 抽獎券 x${rw.tickets}`);
            if (rw.items) Object.entries(rw.items).forEach(([ik, qty]) => { const it = ITEMS[ik]; parts.push(it ? `${it.i}${it.n} x${qty}` : `? x${qty}`); });
            // backward compat for old format
            if (!parts.length && rw.amount) parts.push(`💰 ${rw.amount} 點`);
            if (!parts.length && rw.key) { const it = ITEMS[rw.key]; parts.push(it ? `${it.i}${it.n} x${rw.qty||1}` : `? x${rw.qty||1}`); }
            const rewardText = parts.join('＋') || '未知獎勵';
            const usageText = v.max_uses === 0 ? '無限次' : `${v.used_count}/${v.max_uses}`;
            return `<div class="code-item ${isUsed ? 'code-used' : ''}">
                <div>
                    <div class="code-key">${k}</div>
                    <div class="code-reward">${rewardText} · ${usageText}</div>
                </div>
                <button class="btn btn-sm btn-red" onclick="deleteCode('${k}')" style="padding:6px 10px; font-size:12px;">🗑️</button>
            </div>`;
        }).join('');
    });

    // ===== 信件管理 =====
    let currentMailPlayer = 'p1';
    let mailListenerRef = null;
    let mailListenerCb = null;

    function selectMailPlayer(el) {
        document.querySelectorAll('#body-mails .target-btn').forEach(b => b.classList.remove('selected'));
        el.classList.add('selected');
        currentMailPlayer = el.dataset.mp;
        loadMails();
    }

    function loadMails() {
        if (mailListenerRef && mailListenerCb) {
            mailListenerRef.off('value', mailListenerCb);
        }
        const list = document.getElementById('mail-manage-list');
        list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center;">載入中...</div>';
        mailListenerRef = db.ref('mailbox/' + currentMailPlayer);
        mailListenerCb = mailListenerRef.on('value', snap => {
            const data = snap.val() || {};
            const entries = Object.entries(data).sort((a, b) => (b[1].timestamp || 0) - (a[1].timestamp || 0));
            if (!entries.length) { list.innerHTML = '<div style="color:var(--muted); font-size:13px; text-align:center;">信箱是空的</div>'; return; }
            list.innerHTML = entries.map(([k, m]) => {
                const d = new Date(m.timestamp);
                const timeStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
                const rwParts = [];
                if (m.points || m.amount) rwParts.push(`💰 ${m.points || m.amount} 點`);
                if (m.shards > 0) rwParts.push(`🔹 ${m.shards} 碎片`);
                if (m.tickets > 0) rwParts.push(`🎟️ 抽獎券 x${m.tickets}`);
                if (m.items) Object.entries(m.items).forEach(([ik, qty]) => { const it = ITEMS[ik]; rwParts.push(it ? `${it.i}${it.n} x${qty}` : `? x${qty}`); });
                if (m.item) { const it = ITEMS[m.item.key]; rwParts.push(it ? `${it.i}${it.n} x${m.item.qty}` : `? x${m.item.qty}`); }
                const rewardText = rwParts.join('＋') || '未知獎勵';
                const statusColor = m.claimed ? 'var(--muted)' : 'var(--green)';
                const statusLabel = m.claimed ? '已領取' : '未領取';
                return `<div class="code-item ${m.claimed ? 'code-used' : ''}">
                    <div style="flex:1; min-width:0;">
                        <div style="font-size:13px; font-weight:bold; color:var(--text);">${m.title || '（無標題）'}</div>
                        <div class="code-reward">${rewardText} · ${timeStr} · <span style="color:${statusColor}">${statusLabel}</span></div>
                    </div>
                    ${!m.claimed ? `<button class="btn btn-sm btn-red" onclick="recallMail('${k}')" style="padding:6px 10px; font-size:12px; flex-shrink:0;">收回</button>` : ''}
                </div>`;
            }).join('');
        });
    }

    function recallMail(key) {
        db.ref('mailbox/' + currentMailPlayer + '/' + key).remove();
        showToast('📭 信件已收回', 'var(--muted)');
    }

    // 展開信件管理時自動載入
    const origToggle = toggleSection;
    toggleSection = function(id) {
        origToggle(id);
        if (id === 'mails' && !document.getElementById('body-mails').classList.contains('collapsed')) loadMails();
        if (id === 'overview' && !document.getElementById('body-overview').classList.contains('collapsed')) loadOverview();
    };

    // ===== 玩家狀態總覽 =====
    function loadOverview() {
        const grid = document.getElementById('overview-grid');
        if (!grid) return;
        grid.innerHTML = '<div style="text-align:center;color:var(--muted);font-size:13px;padding:20px;grid-column:1/-1;">載入中...</div>';
        const getLocalDateStr = d => d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
        const today = getLocalDateStr(new Date());
        const NAMES = { p1:'👦🏻 至凱', p2:'👦🏼 柏致' };
        Promise.all([
            db.ref('economy').once('value'),
            db.ref('users/p1').once('value'),
            db.ref('users/p2').once('value')
        ]).then(([econSnap, u1Snap, u2Snap]) => {
            const econ = econSnap.val() || {};
            const users = { p1: u1Snap.val()||{}, p2: u2Snap.val()||{} };
            grid.innerHTML = ['p1','p2'].map(pid => {
                const u = users[pid], pts = econ[pid]||0;
                const streak = u.streak||0, pity = u.gacha_pity||0, energy = u.gacha_energy||0;
                const items = u.items||{};
                const buffs = [];
                if(u.flex_active) buffs.push('🎫 萬能作息券');
                if(u.clover_active) buffs.push('🍀 幸運草');
                if(u.pillow_target) buffs.push('🌙 好夢枕');
                if(u.free_gacha_active) buffs.push('🎟️ 抽獎券待用');
                const buffHtml = buffs.length
                    ? buffs.map(b=>`<span style="display:inline-block;padding:3px 7px;border-radius:10px;background:rgba(123,156,255,0.12);color:var(--primary);font-size:11px;margin:2px;">${b}</span>`).join('')
                    : '<span style="color:var(--muted);font-size:11px;">無</span>';
                const rarityCount = {U:0,C:0,R:0,E:0,M:0};
                Object.entries(items).forEach(([k,qty]) => { const it=ITEMS[k]; if(it&&qty>0) rarityCount[it.r]=(rarityCount[it.r]||0)+qty; });
                const invHtml = Object.entries(rarityCount).filter(([,v])=>v>0)
                    .map(([r,v])=>`<span style="font-size:11px;color:var(--muted);margin-right:6px;">${r}×${v}</span>`).join('')
                    || '<span style="color:var(--muted);font-size:11px;">空</span>';
                const checked = u.last_date === today;
                const badge = checked
                    ? `<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(74,222,128,0.12);color:var(--green);">💤 已打卡</span>`
                    : `<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:rgba(248,113,113,0.1);color:var(--red);">未打卡</span>`;
                return `<div style="background:rgba(0,0,0,0.2);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:14px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                        <span style="font-weight:bold;font-size:14px;">${NAMES[pid]}</span>${badge}
                    </div>
                    <div style="font-size:26px;font-weight:900;color:var(--primary);margin-bottom:6px;">${pts} 點</div>
                    <div style="font-size:12px;color:var(--muted);margin-bottom:6px;">🔥 連勝 ${streak} 天　🎟️ 保底 ${pity}/10　⚡ 能量 ${energy}</div>
                    <div style="font-size:11px;color:var(--muted);font-weight:bold;margin-bottom:3px;">生效道具</div>
                    <div style="display:flex;flex-wrap:wrap;gap:2px;margin-bottom:6px;">${buffHtml}</div>
                    <div style="font-size:11px;color:var(--muted);font-weight:bold;margin-bottom:3px;">背包</div>
                    <div>${invHtml}</div>
                </div>`;
            }).join('');
        }).catch(err => {
            grid.innerHTML = `<div style="color:var(--red);font-size:13px;padding:10px;grid-column:1/-1;">載入失敗: ${err.message}</div>`;
        });
    }

    // 初始化
    renderItemGridCart('mail-item-grid', 'mail');
    renderItemGridCart('code-item-grid', 'code');
    renderCosmGrid('mail-cosm-grid');
    loadOverview();
</script>
</body>
</html>
