<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>握力日記</title>
    <!--

    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:           #1E1912;
            --card:         #2C2418;
            --card2:        #342C1E;
            --border:       rgba(200,160,100,0.22);
            --accent:       #C8883A;
            --accent-lt:    #D4A455;
            --accent-glow:  rgba(200, 136, 58, 0.20);
            --text:         #F2EBD8;
            --text2:        #9E8F7C;
            --text3:        #4A4030;
            --green:        #76A668;
            --red:          #C47070;
            --yellow:       #C8A44A;
        }

        body {
            background: radial-gradient(ellipse at top, #302818 0%, #1E1912 70%);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── User Select ── */
        #user-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 20px;
            gap: 28px;
        }

        .logo-wrap {
            text-align: center;
        }

        .logo-icon {
            font-size: 72px;
            display: block;
            filter: drop-shadow(0 0 28px rgba(255,140,0,0.45));
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { filter: drop-shadow(0 0 28px rgba(255,140,0,0.45)); }
            50%       { filter: drop-shadow(0 0 44px rgba(255,140,0,0.70)); }
        }

        .logo-title {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-top: 12px;
        }

        .logo-sub {
            color: var(--text2);
            font-size: 13px;
            margin-top: 6px;
        }

        .user-cards {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 360px;
        }

        .user-card {
            flex: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 22px;
            padding: 28px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-card:hover {
            border-color: var(--accent);
            background: var(--card2);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255,140,0,0.15);
        }

        .user-card .av { font-size: 42px; }
        .user-card .name { font-size: 18px; font-weight: 800; margin-top: 10px; }
        .user-card .role { font-size: 12px; color: var(--text2); margin-top: 3px; }

        /* ── Main App ── */
        #app {
            display: none;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 90px;
        }

        /* ── Tab bar ── */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: none;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px 20px;
            background: rgba(28,22,14,0.94);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .tab-bar.visible { display: flex; }
        .tab-btn {
            flex: 1; max-width: 180px;
            padding: 10px 0;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card2);
            color: var(--text2);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: rgba(255,140,0,0.12);
            border-color: rgba(255,140,0,0.4);
            color: var(--accent-lt);
        }

        /* ── Tab panels ── */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 16px;
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(28,22,14,0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            margin: 0 -16px;
        }

        .header-title {
            font-size: 18px;
            font-weight: 900;
        }

        .back-btn {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            text-decoration: none;
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 13px;
            transition: all 0.15s;
        }
        .back-btn:hover { border-color: var(--accent); color: var(--text); }

        .user-chip {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text2);
        }

        .user-chip:hover { border-color: var(--accent); color: var(--text); }

        /* ── Status Card ── */
        .status-card {
            background: var(--card);
            border-radius: 26px;
            padding: 26px 24px;
            margin: 14px 0 10px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .status-card::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: var(--accent-glow);
            pointer-events: none;
        }

        .status-date {
            font-size: 12px;
            color: var(--text2);
            font-weight: 600;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .status-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-emoji {
            font-size: 56px;
            line-height: 1;
            flex-shrink: 0;
        }

        .status-info { flex: 1; }

        .status-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent-lt);
            line-height: 1;
            letter-spacing: -2px;
        }

        .status-unit {
            font-size: 18px;
            font-weight: 400;
            color: var(--text2);
            margin-left: 3px;
        }

        .status-label {
            font-size: 15px;
            font-weight: 700;
            margin-top: 6px;
            color: var(--text);
        }

        .status-diff {
            font-size: 12px;
            color: var(--text2);
            margin-top: 3px;
            font-weight: 500;
        }

        .status-diff.up   { color: var(--green); }
        .status-diff.down { color: var(--red); }

        .cold-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,214,10,0.10);
            border: 1px solid rgba(255,214,10,0.28);
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--yellow);
            margin-top: 14px;
        }

        /* ── Input Card ── */
        .input-card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px;
            margin: 10px 0;
            border: 1px solid var(--border);
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .grip-input {
            flex: 1;
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 30px;
            font-weight: 800;
            color: var(--text);
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .grip-input::-webkit-inner-spin-button,
        .grip-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .grip-input:focus { border-color: var(--accent); }
        .grip-input::placeholder { color: var(--text3); font-size: 22px; font-weight: 400; }
        .grip-input:disabled { opacity: 0.38; cursor: not-allowed; }

        .submit-btn {
            background: var(--accent);
            border: none;
            border-radius: 16px;
            padding: 0 26px;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-lt);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,140,0,0.35);
        }

        .submit-btn:active:not(:disabled) { transform: scale(0.97); }

        .submit-btn:disabled {
            background: var(--card2);
            color: var(--text3);
            cursor: not-allowed;
        }

        .recorded-line {
            text-align: center;
            color: var(--green);
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            display: none;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 18px 0 8px;
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: var(--card);
            border-radius: 18px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-val {
            font-size: 24px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .stat-name {
            font-size: 11px;
            color: var(--text2);
            margin-top: 3px;
            font-weight: 500;
        }

        .stat-extra {
            margin-top: 5px;
            font-size: 10px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            border-radius: 100px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
        }

        .tag-orange { background: rgba(255,140,0,0.12); color: var(--accent-lt); }
        .tag-green  { background: rgba(52,199,89,0.12);  color: var(--green); }
        .tag-red    { background: rgba(255,69,58,0.12);   color: var(--red); }
        .tag-muted  { background: rgba(142,142,154,0.12); color: var(--text2); }

        /* ── Fatigue Warning ── */
        .fatigue-wrap {
            background: rgba(255,69,58,0.08);
            border: 1px solid rgba(255,69,58,0.22);
            border-radius: 18px;
            padding: 14px 18px;
            display: none;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
        }

        .fatigue-icon { font-size: 26px; }

        .fatigue-title { font-size: 14px; font-weight: 700; color: var(--red); }
        .fatigue-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--card);
            border-radius: 22px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-title { font-size: 14px; font-weight: 700; }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text2);
            align-items: center;
        }

        .leg-line {
            display: inline-block;
            width: 14px; height: 2px;
            border-radius: 2px;
            vertical-align: middle;
            margin-right: 3px;
        }

        .leg-dash {
            display: inline-block;
            width: 14px; height: 0;
            border-top: 2px dashed #8E8E9A;
            vertical-align: middle;
            margin-right: 3px;
        }

        .chart-svg {
            width: 100%;
            overflow: visible;
            display: block;
        }

        /* ── Records List ── */
        .records-card {
            background: var(--card);
            border-radius: 22px;
            padding: 6px 20px;
            border: 1px solid var(--border);
        }

        .rec-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .rec-row:last-child { border-bottom: none; }

        .rec-date {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }

        .rec-date.today { color: var(--accent-lt); font-weight: 700; }

        .rec-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-val { font-size: 17px; font-weight: 800; }

        .rec-delta {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: var(--text2);
        }

        .empty-icon { font-size: 44px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; font-weight: 600; }
        .empty-sub  { font-size: 12px; color: var(--text3); margin-top: 5px; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(110px);
            background: #22222F;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Edit Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); display: flex; align-items: center;
            justify-content: center; z-index: 900; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 320px;
            transform: translateY(16px); transition: transform 0.25s;
        }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
        .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
        .modal-input {
            width: 100%; background: var(--card2); border: 2px solid var(--border);
            border-radius: 14px; padding: 14px 16px; font-size: 28px; font-weight: 800;
            color: var(--text); text-align: center; outline: none; font-family: inherit;
            transition: border-color 0.2s; -moz-appearance: textfield;
        }
        .modal-input::-webkit-inner-spin-button,
        .modal-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .modal-input:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-btn {
            flex: 1; padding: 13px; border-radius: 14px; border: none; font-size: 14px;
            font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s;
        }
        .modal-btn-cancel { background: var(--card2); color: var(--text2); }
        .modal-btn-cancel:hover { color: var(--text); }
        .modal-btn-confirm { background: var(--accent); color: #fff; }
        .modal-btn-confirm:hover { background: var(--accent-lt); }

        /* ── PR Glow ── */
        @keyframes pr-glow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(200,164,74,0); border-color: var(--border); }
            50%       { box-shadow: 0 0 22px 5px rgba(200,164,74,0.28); border-color: rgba(200,164,74,0.55); }
        }

        .stat-box.pr-today {
            animation: pr-glow 2.4s ease-in-out infinite;
            background: rgba(200,164,74,0.07);
        }

        .stat-box.pr-today .stat-val { color: var(--yellow); }

        /* ── Hand Chips ── */
        .hand-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 14px;
        }

        .hand-chip {
            border-radius: 14px;
            padding: 11px 14px;
            text-align: center;
        }

        .hand-chip-l {
            background: rgba(90,200,250,0.07);
            border: 1px solid rgba(90,200,250,0.22);
        }

        .hand-chip-r {
            background: rgba(255,140,0,0.08);
            border: 1px solid rgba(255,140,0,0.22);
        }

        .hand-chip-label {
            font-size: 11px;
            color: var(--text2);
            font-weight: 600;
            margin-bottom: 5px;
        }

        .hand-chip-val {
            font-size: 22px;
            font-weight: 900;
            letter-spacing: -0.5px;
            line-height: 1;
        }

        .hand-chip-l .hand-chip-val { color: #5AC8FA; }
        .hand-chip-r .hand-chip-val { color: #FF8C00; }

        .hand-chip-unit {
            font-size: 12px;
            font-weight: 400;
            color: var(--text2);
            margin-left: 2px;
        }

        /* ── Records hover ── */
        .rec-row { transition: background 0.15s; border-radius: 12px; margin: 0 -8px; padding: 12px 8px; }
        .rec-row:hover { background: var(--card2); }

        /* ── Accordion ── */
        .accordion-card {
            background: var(--card);
            border-radius: 22px;
            border: 1px solid var(--border);
            overflow: hidden;
            margin: 10px 0;
        }
        .accordion-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            cursor: pointer;
            user-select: none;
            transition: background 0.15s;
        }
        .accordion-head:hover { background: var(--card2); }
        .accordion-head-title { font-size: 13px; font-weight: 700; }
        .accordion-arrow {
            font-size: 13px;
            color: var(--text2);
            transition: transform 0.25s;
        }
        .accordion-arrow.open { transform: rotate(180deg); }
        .accordion-body { max-height: 0; overflow: hidden; transition: max-height 0.32s ease; }
        .accordion-body.open { max-height: 1000px; }

        /* ── Expand chart button ── */
        .expand-chart-btn {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
        }
        .expand-chart-btn:hover { border-color: var(--accent); color: var(--text); }

        /* ── Chart Modal ── */
        .chart-modal {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.72);
            backdrop-filter: blur(6px);
            display: flex; align-items: center; justify-content: center;
            z-index: 900; padding: 16px;
            opacity: 0; pointer-events: none; transition: opacity 0.22s;
        }
        .chart-modal.show { opacity: 1; pointer-events: all; }
        .chart-modal-box {
            background: var(--card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 26px;
            padding: 24px 20px 20px;
            width: 100%; max-width: 520px;
            transform: translateY(20px); transition: transform 0.25s;
        }

<script>
// ── Firebase ──────────────────────────────────────────────────────────
const firebaseConfig = {
    apiKey: "AIzaSyArUT_yPRn3CR9ejNbp8ycYGjP6gHPPKJA",
    authDomain: "gymsleep-e99d9.firebaseapp.com",
    databaseURL: "https://gymsleep-e99d9-default-rtdb.firebaseio.com/",
    projectId: "gymsleep-e99d9",
    storageBucket: "gymsleep-e99d9.firebasestorage.app",
    messagingSenderId: "346919034740",
    appId: "1:346919034740:web:3399498d40359c10b61621"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ── State ─────────────────────────────────────────────────────────────
let ME = null;
let records = {};
let dbListener = null;
let _sortedCache = [];
let _chartModalState = null;
let _chartTtActiveDate = null;

// ── Helpers ───────────────────────────────────────────────────────────
function todayStr() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function fmtShort(str) {
    const [, m, d] = str.split('-');
    return `${+m}/${+d}`;
}

function fmtFull(str) {
    const [y, m, d] = str.split('-');
    return `${y}年${+m}月${+d}日`;
}

const WEEK = ['日','一','二','三','四','五','六'];

function showToast(msg, dur = 2200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), dur);
}

// ── User ──────────────────────────────────────────────────────────────
function selectUser(player) {
    ME = player;
    document.getElementById('user-select').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('tab-bar').classList.add('visible');
    document.getElementById('user-chip').textContent = (player === 'p1' ? '至凱' : '柏致') + ' · 切換';
    loadRecords();
}

function switchTab(tab) {
    document.getElementById('panel-record').classList.toggle('active', tab === 'record');
    document.getElementById('panel-stats').classList.toggle('active', tab === 'stats');
    document.getElementById('tab-record').classList.toggle('active', tab === 'record');
    document.getElementById('tab-stats').classList.toggle('active', tab === 'stats');
}

function switchUser() {
    if (dbListener) { db.ref(`grip/${ME}/records`).off('value', dbListener); dbListener = null; }
    records = {};
    ME = null;
    localStorage.removeItem('grip_user');
    document.getElementById('user-select').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('tab-bar').classList.remove('visible');
    switchTab('record');
}

// ── Load ──────────────────────────────────────────────────────────────
function loadRecords() {
    if (dbListener) db.ref(`grip/${ME}/records`).off('value', dbListener);
    dbListener = db.ref(`grip/${ME}/records`).on('value', snap => {
        records = snap.val() || {};
        render();
    });
}

// ── Sorted records ────────────────────────────────────────────────────
// Normalises both legacy (number) and new ({ l, r }) records.
// `value` = max(l, r) used for all stats/chart compatibility.
function getSorted() {
    return Object.entries(records)
        .map(([date, raw]) => {
            let l, r;
            if (raw !== null && typeof raw === 'object') {
                l = Number(raw.l) || 0;
                r = Number(raw.r) || 0;
            } else {
                // Legacy: single number → treat as right hand
                l = Number(raw) || 0;
                r = Number(raw) || 0;
            }
            const recorded = [l, r].filter(v => v > 0);
            const value = recorded.length ? recorded.reduce((s, v) => s + v, 0) / recorded.length : 0;
            return { date, l, r, value };
        })
        .sort((a, b) => a.date < b.date ? -1 : 1);
}

// ── Status ────────────────────────────────────────────────────────────
// Returns null if today not recorded.
// Returns { type, diff, avg7 } or { type:'cold', remaining }
function calcStatus(sorted, today) {
    const todayIdx = sorted.findIndex(r => r.date === today);
    if (todayIdx < 0) return null;

    const prior = sorted.slice(0, todayIdx);
    if (prior.length < 7) return { type: 'cold', remaining: 7 - prior.length };

    const last7 = prior.slice(-7);
    const avg7 = last7.reduce((s, r) => s + r.value, 0) / 7;
    const val = sorted[todayIdx].value;
    const diff = (val - avg7) / avg7;

    if (diff > 0.05)  return { type: 'fire',   diff, avg7 };
    if (diff >= 0)    return { type: 'strong',  diff, avg7 };
    if (diff >= -0.05) return { type: 'tired',  diff, avg7 };
    return              { type: 'rest',  diff, avg7 };
}

// Records below 7-day prior average, from most recent backwards
// Returns { count, isConsecutiveCalendar }
function fatigueDays(sorted) {
    const fatigueRecs = [];
    for (let i = sorted.length - 1; i >= 7; i--) {
        const avg = sorted.slice(i-7, i).reduce((s, r) => s + r.value, 0) / 7;
        if (sorted[i].value < avg) fatigueRecs.unshift(sorted[i]);
        else break;
    }
    if (fatigueRecs.length === 0) return { count: 0, isConsecutiveCalendar: true };
    let isConsecutiveCalendar = true;
    for (let i = 1; i < fatigueRecs.length; i++) {
        const diff = (new Date(fatigueRecs[i].date) - new Date(fatigueRecs[i-1].date)) / 86400000;
        if (diff > 1) { isConsecutiveCalendar = false; break; }
    }
    return { count: fatigueRecs.length, isConsecutiveCalendar };
}

// 7-day rolling avg at index i (uses i-7 to i-1)
function rollingAvg7At(sorted, i) {
    if (i < 7) return null;
    return sorted.slice(i-7, i).reduce((s, r) => s + r.value, 0) / 7;
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
    const sorted = getSorted();
    _sortedCache = sorted;
    const today = todayStr();
    const todayVal = records[today];
    const hasToday = todayVal != null;

    // Header date
    const now = new Date();
    document.getElementById('status-date').textContent =
        `${fmtFull(today)} 週${WEEK[now.getDay()]}`;

    // Status card
    renderStatusCard(sorted, today, hasToday);

    // Input state
    const inputL = document.getElementById('grip-input-l');
    const inputR = document.getElementById('grip-input-r');
    const btn = document.getElementById('submit-btn');
    const recLine = document.getElementById('recorded-line');
    if (hasToday) {
        const todayRec = sorted.find(r => r.date === today);
        inputL.value = todayRec ? todayRec.l : '';
        inputR.value = todayRec ? todayRec.r : '';
        inputL.disabled = true;
        inputR.disabled = true;
        btn.disabled = true;
        recLine.style.display = 'flex';
    } else {
        inputL.value = '';
        inputR.value = '';
        inputL.disabled = false;
        inputR.disabled = false;
        btn.disabled = false;
        recLine.style.display = 'none';
    }

    // Stats
    renderStats(sorted);

    // Fatigue
    const { count: fc, isConsecutiveCalendar } = fatigueDays(sorted);
    const fw = document.getElementById('fatigue-wrap');
    if (fc >= 3) {
        fw.style.display = 'flex';
        const label = isConsecutiveCalendar ? `連續 ${fc} 天` : `${fc} 筆`;
        document.getElementById('fatigue-sub').textContent =
            `已 ${label} 低於7日基準，考慮讓身體休息一下`;
    } else {
        fw.style.display = 'none';
    }

    // Chart
    renderChart(sorted);

    // Records list
    renderList(sorted);
}

function renderStatusCard(sorted, today, hasToday) {
    const emojiEl = document.getElementById('s-emoji');
    const valEl   = document.getElementById('s-value');
    const lblEl   = document.getElementById('s-label');
    const diffEl  = document.getElementById('s-diff');
    const extraEl = document.getElementById('s-extra');

    if (!hasToday) {
        emojiEl.textContent = sorted.length === 0 ? '💪' : '⏳';
        valEl.textContent = '—';
        lblEl.textContent = '今日尚未記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = '';
        return;
    }

    const status = calcStatus(sorted, today);
    const todayRec = sorted.find(r => r.date === today);
    valEl.textContent = todayRec ? todayRec.value.toFixed(1) : '—';

    if (!status) {
        emojiEl.textContent = '💪';
        lblEl.textContent = '已記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = '';
        return;
    }

    if (status.type === 'cold') {
        emojiEl.textContent = '📈';
        lblEl.textContent = '已記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = `<div class="cold-badge">⏳ 累積基準中，還需 ${status.remaining} 筆</div>`;
        return;
    }

    const pct  = (status.diff * 100).toFixed(1);
    const sign = status.diff >= 0 ? '+' : '';

    const cfg = {
        fire:   { emoji: '🔥', lbl: '狀態極佳！今天超越了自己',  cls: 'up' },
        strong: { emoji: '💪', lbl: '表現穩定，維持在水準上',    cls: 'up' },
        tired:  { emoji: '😮‍💨', lbl: '今天有點疲憊',             cls: 'down' },
        rest:   { emoji: '🛌', lbl: '建議充分休息，養精蓄銳',    cls: 'down' },
    };
    const c = cfg[status.type];
    emojiEl.textContent = c.emoji;
    lblEl.textContent   = c.lbl;
    diffEl.textContent  = `${sign}${pct}% vs 7日均線（${status.avg7.toFixed(1)} kg）`;
    diffEl.className    = `status-diff ${c.cls}`;
    const isNewFmt = records[today] !== null && typeof records[today] === 'object';
    if (todayRec && isNewFmt && todayRec.l > 0 && todayRec.r > 0) {
        extraEl.innerHTML = `<div class="hand-row">
            <div class="hand-chip hand-chip-l">
                <div class="hand-chip-label">🤜 左手</div>
                <div class="hand-chip-val">${todayRec.l}<span class="hand-chip-unit">kg</span></div>
            </div>
            <div class="hand-chip hand-chip-r">
                <div class="hand-chip-label">🤛 右手</div>
                <div class="hand-chip-val">${todayRec.r}<span class="hand-chip-unit">kg</span></div>
            </div>
        </div>`;
    } else {
        extraEl.innerHTML = '';
    }
}

function renderStats(sorted) {
    const prLEl    = document.getElementById('stat-pr-l');
    const prLDate  = document.getElementById('stat-pr-l-date');
    const prREl    = document.getElementById('stat-pr-r');
    const prRDate  = document.getElementById('stat-pr-r-date');
    const avg7El   = document.getElementById('stat-7avg');
    const trendEl  = document.getElementById('stat-trend');
    const avg30El  = document.getElementById('stat-30avg');
    const daysEl   = document.getElementById('stat-days');

    if (sorted.length === 0) {
        [prLEl, prREl, avg7El, avg30El].forEach(e => e.textContent = '—');
        prLDate.innerHTML = prRDate.innerHTML = trendEl.innerHTML = daysEl.innerHTML = '';
        return;
    }

    // Separate L / R PRs — only consider records from 4/16 onwards (split-hand tracking start)
    const today = todayStr();
    const PR_START = '2026-04-16';
    const withL = sorted.filter(r => r.l > 0 && r.date >= PR_START);
    const withR = sorted.filter(r => r.r > 0 && r.date >= PR_START);

    if (withL.length) {
        const prL = withL.reduce((mx, r) => r.l > mx.l ? r : mx, withL[0]);
        const isTodayL = prL.date === today;
        prLEl.textContent = prL.l.toFixed(1);
        prLDate.innerHTML = isTodayL
            ? `<span class="tag" style="background:rgba(90,200,250,0.15);color:#5AC8FA">✨ 今天！</span>`
            : `<span class="tag tag-muted">${fmtShort(prL.date)}</span>`;
        document.getElementById('stat-box-prl').classList.toggle('pr-today', isTodayL);
    } else {
        prLEl.textContent = '—'; prLDate.innerHTML = '';
    }

    if (withR.length) {
        const prR = withR.reduce((mx, r) => r.r > mx.r ? r : mx, withR[0]);
        const isTodayR = prR.date === today;
        prREl.textContent = prR.r.toFixed(1);
        prRDate.innerHTML = isTodayR
            ? `<span class="tag" style="background:rgba(255,140,0,0.15);color:#FF8C00">✨ 今天！</span>`
            : `<span class="tag tag-muted">${fmtShort(prR.date)}</span>`;
        document.getElementById('stat-box-prr').classList.toggle('pr-today', isTodayR);
    } else {
        prREl.textContent = '—'; prRDate.innerHTML = '';
    }

    // 7-day avg
    const last7 = sorted.slice(-7);
    const avg7 = last7.reduce((s, r) => s + r.value, 0) / last7.length;
    avg7El.textContent = avg7.toFixed(1);

    // Trend: recent 7 vs prior 7
    const prev7 = sorted.slice(-14, -7);
    if (prev7.length >= 3) {
        const pAvg = prev7.reduce((s, r) => s + r.value, 0) / prev7.length;
        const diff = (avg7 - pAvg) / pAvg;
        if (diff > 0.02)
            trendEl.innerHTML = `<span class="tag tag-green">↑ 上升</span>`;
        else if (diff < -0.02)
            trendEl.innerHTML = `<span class="tag tag-red">↓ 下降</span>`;
        else
            trendEl.innerHTML = `<span class="tag tag-muted">→ 穩定</span>`;
    } else {
        trendEl.innerHTML = `<span class="tag tag-muted">累積中</span>`;
    }

    // 30-day avg
    const last30 = sorted.slice(-30);
    const avg30 = last30.reduce((s, r) => s + r.value, 0) / last30.length;
    avg30El.textContent = avg30.toFixed(1);
    daysEl.innerHTML = `<span class="tag tag-muted">${sorted.length} 天</span>`;
}

// ── Chart ─────────────────────────────────────────────────────────────
function buildLineSegs(data, xOf, yOf, valFn) {
    const GAP_MS = 86400000 * 1.5;
    const segs = [];
    let cur = [];
    data.forEach((d, i) => {
        const v = valFn(d);
        if (i > 0 && new Date(d.date) - new Date(data[i-1].date) > GAP_MS) {
            if (cur.length >= 2) segs.push(cur);
            cur = [];
        }
        if (v > 0) cur.push(`${xOf(d.date)},${yOf(v)}`);
        else { if (cur.length >= 2) segs.push(cur); cur = []; }
    });
    if (cur.length >= 1) segs.push(cur);
    return segs;
}

function renderChart(sorted) {
    const svg = document.getElementById('chart-svg');

    if (sorted.length < 2) {
        svg.innerHTML = `<text x="260" y="80" text-anchor="middle" fill="#3A3A45"
            font-size="13" font-family="-apple-system,sans-serif">需要更多數據（至少 2 筆）</text>`;
        return;
    }

    const data = sorted.slice(-30);
    const n    = data.length;
    const today = todayStr();

    const W  = 520, H = 160;
    const PL = 34, PR = 10, PT = 10, PB = 28;
    const cW = W - PL - PR;
    const cH = H - PT - PB;

    // Include both l and r for Y scale
    const allVals = data.flatMap(d => [d.l, d.r]).filter(v => v > 0);
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const range = maxV - minV || 1;

    const t0 = new Date(data[0].date).getTime();
    const t1 = new Date(data[n-1].date).getTime();
    const tSpan = t1 - t0 || 1;
    const xOf = dateStr => PL + ((new Date(dateStr).getTime() - t0) / tSpan) * cW;
    const yOf = v => PT + cH - ((v - minV) / range) * cH;

    // Two lines: right (orange) and left (blue)
    const segsR = buildLineSegs(data, xOf, yOf, d => d.r);
    const segsL = buildLineSegs(data, xOf, yOf, d => d.l);

    // 7-day rolling baseline (based on max value)
    const GAP_MS = 86400000 * 1.5;
    const baseSegs = [];
    let bSeg = [];
    data.forEach((d, i) => {
        if (i > 0 && new Date(d.date) - new Date(data[i-1].date) > GAP_MS) {
            if (bSeg.length >= 2) baseSegs.push(bSeg.join(' '));
            bSeg = [];
        }
        const globalIdx = sorted.findIndex(r => r.date === d.date);
        const avg = rollingAvg7At(sorted, globalIdx);
        if (avg !== null) bSeg.push(`${xOf(d.date)},${yOf(avg)}`);
        else { if (bSeg.length >= 2) baseSegs.push(bSeg.join(' ')); bSeg = []; }
    });
    if (bSeg.length >= 2) baseSegs.push(bSeg.join(' '));

    // Y axis labels
    const yLevels = [minV, (minV+maxV)/2, maxV];
    const yLabels = yLevels.map(v =>
        `<text x="${PL-4}" y="${yOf(v)}" text-anchor="end" dominant-baseline="middle"
            fill="#3A3A45" font-size="9" font-family="-apple-system,sans-serif">${Math.round(v)}</text>`
    ).join('');

    // X axis labels
    const step = Math.max(1, Math.floor(n / 5));
    const xLabels = data.map((d, i) => {
        if (i % step !== 0 && i !== n-1) return '';
        return `<text x="${xOf(d.date)}" y="${H-3}" text-anchor="middle"
            fill="#3A3A45" font-size="9" font-family="-apple-system,sans-serif">${fmtShort(d.date)}</text>`;
    }).join('');

    // Dots for both hands
    const dotsR = data.filter(d => d.r > 0).map(d => {
        const isT = d.date === today;
        return `<circle cx="${xOf(d.date)}" cy="${yOf(d.r)}"
            r="${isT ? 5 : 2.5}" fill="#FF8C00"
            stroke="${isT ? '#fff' : 'none'}" stroke-width="${isT ? 1.5 : 0}"/>`;
    }).join('');
    const dotsL = data.filter(d => d.l > 0).map(d => {
        const isT = d.date === today;
        return `<circle cx="${xOf(d.date)}" cy="${yOf(d.l)}"
            r="${isT ? 5 : 2.5}" fill="#5AC8FA"
            stroke="${isT ? '#fff' : 'none'}" stroke-width="${isT ? 1.5 : 0}"/>`;
    }).join('');

    const bottomY = PT + cH;
    const areaR = segsR.map(pts => {
        if (pts.length < 2) return '';
        const firstX = parseFloat(pts[0].split(',')[0]);
        const lastX  = parseFloat(pts[pts.length-1].split(',')[0]);
        return `<polygon points="${[...pts, `${lastX},${bottomY}`, `${firstX},${bottomY}`].join(' ')}" fill="url(#gradR)"/>`;
    }).join('');
    const areaL = segsL.map(pts => {
        if (pts.length < 2) return '';
        const firstX = parseFloat(pts[0].split(',')[0]);
        const lastX  = parseFloat(pts[pts.length-1].split(',')[0]);
        return `<polygon points="${[...pts, `${lastX},${bottomY}`, `${firstX},${bottomY}`].join(' ')}" fill="url(#gradL)"/>`;
    }).join('');

    // subtle horizontal grid lines
    const gridLines = [0.25, 0.5, 0.75].map(f => {
        const gy = PT + cH * f;
        return `<line x1="${PL}" y1="${gy}" x2="${W-PR}" y2="${gy}" stroke="#1C1C27" stroke-width="1"/>`;
    }).join('');

    svg.innerHTML = `
        <defs>
            <linearGradient id="gradR" x1="0" y1="${PT}" x2="0" y2="${bottomY}" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.42"/>
                <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="gradL" x1="0" y1="${PT}" x2="0" y2="${bottomY}" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#5AC8FA" stop-opacity="0.32"/>
                <stop offset="100%" stop-color="#5AC8FA" stop-opacity="0"/>
            </linearGradient>
        </defs>
        ${gridLines}
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${bottomY}" stroke="#1C1C27" stroke-width="1"/>
        <line x1="${PL}" y1="${bottomY}" x2="${W-PR}" y2="${bottomY}" stroke="#1C1C27" stroke-width="1"/>
        ${yLabels}
        ${xLabels}
        ${areaL}
        ${areaR}
        ${baseSegs.map(pts =>
            `<polyline points="${pts}" fill="none" stroke="#3A3A52"
                stroke-width="1.5" stroke-dasharray="5,3"/>`
        ).join('')}
        ${segsL.map(pts =>
            `<polyline points="${pts.join(' ')}" fill="none" stroke="#5AC8FA"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>`
        ).join('')}
        ${segsR.map(pts =>
            `<polyline points="${pts.join(' ')}" fill="none" stroke="#FF8C00"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`
        ).join('')}
        ${dotsL}
        ${dotsR}`;
}

// ── Records List ──────────────────────────────────────────────────────
function renderList(sorted) {
    const el = document.getElementById('records-card');

    if (sorted.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">💪</div>
                <div class="empty-text">開始你的第一次記錄吧！</div>
                <div class="empty-sub">每天一次，見證自己的成長</div>
            </div>`;
        return;
    }

    const recent = sorted.slice(-10).reverse();
    el.innerHTML = recent.map(r => {
        const idx = sorted.findIndex(s => s.date === r.date);
        const isT = r.date === todayStr();
        const isLegacy = !(records[r.date] !== null && typeof records[r.date] === 'object');

        let deltaHTML = '';
        if (idx > 0) {
            const delta = r.value - sorted[idx-1].value;
            const sign = delta >= 0 ? '+' : '';
            const cls = delta > 0 ? 'tag-green' : delta < 0 ? 'tag-red' : 'tag-muted';
            deltaHTML = `<span class="rec-delta tag ${cls}">${sign}${delta.toFixed(1)}</span>`;
        }

        const handHTML = isLegacy
            ? `<div class="rec-val">${r.value}<span style="font-size:12px;color:var(--text2);font-weight:400"> kg</span></div>`
            : `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;">
                <div style="font-size:13px;font-weight:700;color:#5AC8FA">🤜 ${r.l}<span style="font-size:11px;font-weight:400"> kg</span></div>
                <div style="font-size:13px;font-weight:700;color:#FF8C00">🤛 ${r.r}<span style="font-size:11px;font-weight:400"> kg</span></div>
               </div>`;

        return `<div class="rec-row">
            <div class="rec-date ${isT ? 'today' : ''}">${isT ? '今天' : fmtShort(r.date)}</div>
            <div class="rec-right">
                ${handHTML}
                ${deltaHTML}
                <button onclick="openEditModalDate('${r.date}')" style="margin-left:6px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:6px;transition:color 0.15s" title="編輯" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">✏️</button>
            </div>
        </div>`;
    }).join('');
}

// ── Sound ─────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='sine', vol=0.18) {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
}
function sfxRecord()  { beep(520,0.08); setTimeout(()=>beep(780,0.12),80); }
function sfxEdit()    { beep(400,0.06,'triangle'); setTimeout(()=>beep(500,0.08,'triangle'),60); }
function sfxError()   { beep(220,0.18,'sawtooth',0.1); }

// ── Edit today (via modal) ────────────────────────────────────────────
let editingDate = null;

function openEditModal() { openEditModalDate(todayStr()); }

function openEditModalDate(date) {
    const raw = records[date];
    let l = 0, r = 0;
    if (raw !== null && typeof raw === 'object') {
        l = raw.l || 0; r = raw.r || 0;
    } else if (raw) {
        l = Number(raw); r = Number(raw);
    }
    editingDate = date;
    sfxEdit();
    document.getElementById('edit-modal-sub').textContent = `修改 ${fmtFull(date)} 的紀錄`;
    document.getElementById('edit-modal-input-l').value = l || '';
    document.getElementById('edit-modal-input-r').value = r || '';
    document.getElementById('edit-modal').classList.add('show');
    document.getElementById('edit-modal-input-r').focus();
}

function closeEditModal(e) {
    if (e && e.target !== document.getElementById('edit-modal')) return;
    document.getElementById('edit-modal').classList.remove('show');
    editingDate = null;
}

function confirmEdit() {
    const rawL = document.getElementById('edit-modal-input-l').value;
    const rawR = document.getElementById('edit-modal-input-r').value;
    const l = parseFloat(rawL), r = parseFloat(rawR);
    if ((!rawL && !rawR) || (rawL && (isNaN(l) || l <= 0 || l > 200)) || (rawR && (isNaN(r) || r <= 0 || r > 200))) {
        showToast('⚠️ 請輸入有效握力值（1–200 kg）');
        return;
    }
    const finalL = rawL ? Math.round(l * 10) / 10 : 0;
    const finalR = rawR ? Math.round(r * 10) / 10 : 0;
    if (finalL === 0 && finalR === 0) { showToast('⚠️ 請至少輸入一手的握力值'); return; }
    const date = editingDate || todayStr();
    db.ref(`grip/${ME}/records/${date}`).set({ l: finalL, r: finalR })
        .then(() => { sfxRecord(); showToast('✅ 紀錄已更新！'); document.getElementById('edit-modal').classList.remove('show'); editingDate = null; })
        .catch(() => { sfxError(); showToast('❌ 儲存失敗，請重試'); });
}

// ── Submit ────────────────────────────────────────────────────────────
function submitToday() {
    const rawL = document.getElementById('grip-input-l').value;
    const rawR = document.getElementById('grip-input-r').value;
    const l = parseFloat(rawL), r = parseFloat(rawR);

    if (!rawL && !rawR) { showToast('⚠️ 請輸入左手或右手的握力值'); return; }
    if (rawL && (isNaN(l) || l <= 0 || l > 200)) { showToast('⚠️ 左手數值無效（1–200 kg）'); return; }
    if (rawR && (isNaN(r) || r <= 0 || r > 200)) { showToast('⚠️ 右手數值無效（1–200 kg）'); return; }

    const finalL = rawL ? Math.round(l * 10) / 10 : 0;
    const finalR = rawR ? Math.round(r * 10) / 10 : 0;

    db.ref(`grip/${ME}/records/${todayStr()}`).set({ l: finalL, r: finalR })
        .then(() => { sfxRecord(); showToast('✅ 今日握力已記錄！'); })
        .catch(() => { sfxError(); showToast('❌ 儲存失敗，請重試'); });
}

function renderChartModal(sorted) {
    const svg = document.getElementById('chart-modal-svg');
    if (sorted.length < 2) {
        svg.innerHTML = `<text x="300" y="120" text-anchor="middle" fill="#3A3A45"
            font-size="14" font-family="-apple-system,sans-serif">需要更多數據（至少 2 筆）</text>`;
        return;
    }

    const data  = sorted.slice(-30);
    const n     = data.length;
    const today = todayStr();
    const W = 600, H = 240, PL = 40, PR = 12, PT = 16, PB = 34;
    const cW = W - PL - PR, cH = H - PT - PB;
    const bottomY = PT + cH;

    const allVals = data.flatMap(d => [d.l, d.r]).filter(v => v > 0);
    const minV = Math.min(...allVals), maxV = Math.max(...allVals);
    const range = maxV - minV || 1;

    const t0 = new Date(data[0].date).getTime();
    const t1 = new Date(data[n-1].date).getTime();
    const tSpan = t1 - t0 || 1;
    const xOf = ds => PL + ((new Date(ds).getTime() - t0) / tSpan) * cW;
    const yOf = v  => PT + cH - ((v - minV) / range) * cH;

    _chartModalState = { data, xOf, yOf, W, H };

    const segsR = buildLineSegs(data, xOf, yOf, d => d.r);
    const segsL = buildLineSegs(data, xOf, yOf, d => d.l);

    const mkArea = (segs, grad) => segs.map(pts => {
        if (pts.length < 2) return '';
        const fx = parseFloat(pts[0].split(',')[0]);
        const lx = parseFloat(pts[pts.length-1].split(',')[0]);
        return `<polygon points="${[...pts,`${lx},${bottomY}`,`${fx},${bottomY}`].join(' ')}" fill="url(#${grad})"/>`;
    }).join('');

    const GAP_MS = 86400000 * 1.5;
    const baseSegs = []; let bSeg = [];
    data.forEach((d, i) => {
        if (i > 0 && new Date(d.date) - new Date(data[i-1].date) > GAP_MS) {
            if (bSeg.length >= 2) baseSegs.push(bSeg.join(' ')); bSeg = [];
        }
        const gi = sorted.findIndex(r => r.date === d.date);
        const avg = rollingAvg7At(sorted, gi);
        if (avg !== null) bSeg.push(`${xOf(d.date)},${yOf(avg)}`);
        else { if (bSeg.length >= 2) baseSegs.push(bSeg.join(' ')); bSeg = []; }
    });
    if (bSeg.length >= 2) baseSegs.push(bSeg.join(' '));

    const gridLines = [0.25, 0.5, 0.75].map(f =>
        `<line x1="${PL}" y1="${PT + cH*f}" x2="${W-PR}" y2="${PT + cH*f}" stroke="#1C1C27" stroke-width="1"/>`
    ).join('');

    const yLevels = [0, 0.25, 0.5, 0.75, 1].map(f => minV + range * f);
    const yLabels = yLevels.map(v =>
        `<text x="${PL-5}" y="${yOf(v)}" text-anchor="end" dominant-baseline="middle"
            fill="#3A3A45" font-size="10" font-family="-apple-system,sans-serif">${Math.round(v)}</text>`
    ).join('');

    const step = Math.max(1, Math.floor(n / 8));
    const xLabels = data.map((d, i) => {
        if (i % step !== 0 && i !== n-1) return '';
        return `<text x="${xOf(d.date)}" y="${H-6}" text-anchor="middle"
            fill="#3A3A45" font-size="10" font-family="-apple-system,sans-serif">${fmtShort(d.date)}</text>`;
    }).join('');

    const mkDots = (hand, color) => data.filter(d => d[hand] > 0).map(d => {
        const isT = d.date === today;
        return `<circle cx="${xOf(d.date)}" cy="${yOf(d[hand])}"
            r="${isT ? 6 : 4}" fill="${color}"
            stroke="${isT ? '#fff' : 'none'}" stroke-width="${isT ? 2 : 0}"/>`;
    }).join('');

    svg.innerHTML = `
        <defs>
            <linearGradient id="mgradR" x1="0" y1="${PT}" x2="0" y2="${bottomY}" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#FF8C00" stop-opacity="0.42"/>
                <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
            </linearGradient>
            <linearGradient id="mgradL" x1="0" y1="${PT}" x2="0" y2="${bottomY}" gradientUnits="userSpaceOnUse">
                <stop offset="0%"   stop-color="#5AC8FA" stop-opacity="0.32"/>
                <stop offset="100%" stop-color="#5AC8FA" stop-opacity="0"/>
            </linearGradient>
        </defs>
        ${gridLines}
        <line x1="${PL}" y1="${PT}"      x2="${PL}"   y2="${bottomY}" stroke="#1C1C27" stroke-width="1"/>
        <line x1="${PL}" y1="${bottomY}" x2="${W-PR}" y2="${bottomY}" stroke="#1C1C27" stroke-width="1"/>
        ${yLabels}${xLabels}
        ${mkArea(segsL,'mgradL')}${mkArea(segsR,'mgradR')}
        ${baseSegs.map(p => `<polyline points="${p}" fill="none" stroke="#3A3A52" stroke-width="1.5" stroke-dasharray="5,3"/>`).join('')}
        ${segsL.map(p => `<polyline points="${p.join(' ')}" fill="none" stroke="#5AC8FA" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>`).join('')}
        ${segsR.map(p => `<polyline points="${p.join(' ')}" fill="none" stroke="#FF8C00" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`).join('')}
        ${mkDots('l','#5AC8FA')}${mkDots('r','#FF8C00')}
        <line id="tt-vline" x1="0" y1="${PT}" x2="0" y2="${bottomY}"
              stroke="rgba(255,255,255,0.15)" stroke-width="1.5" stroke-dasharray="4,3" display="none"/>`;

    // Reset tooltip state on re-render
    _chartTtActiveDate = null;
    document.getElementById('chart-tt').style.display = 'none';

    // Interaction handler
    svg.onclick = svg.ontouchstart = null;
    function onInteract(clientX) {
        if (!_chartModalState) return;
        const { data, xOf, yOf, W, H } = _chartModalState;
        const rect = svg.getBoundingClientRect();
        const svgX = (clientX - rect.left) / rect.width * W;

        let closest = null, minD = Infinity;
        data.forEach(d => { const dx = Math.abs(xOf(d.date) - svgX); if (dx < minD) { minD = dx; closest = d; } });
        if (!closest) return;

        const tt = document.getElementById('chart-tt');
        if (_chartTtActiveDate === closest.date) {
            tt.style.display = 'none';
            _chartTtActiveDate = null;
            svg.querySelector('#tt-vline')?.setAttribute('display','none');
            return;
        }
        _chartTtActiveDate = closest.date;

        // Vertical indicator line
        const vl = svg.querySelector('#tt-vline');
        if (vl) { vl.setAttribute('x1', xOf(closest.date)); vl.setAttribute('x2', xOf(closest.date)); vl.removeAttribute('display'); }

        // Content
        const rows = [];
        if (closest.l > 0) rows.push(`<span style="color:#5AC8FA;font-weight:700">🤜 ${closest.l} kg</span>`);
        if (closest.r > 0) rows.push(`<span style="color:#FF8C00;font-weight:700">🤛 ${closest.r} kg</span>`);
        document.getElementById('tt-date').textContent = fmtShort(closest.date);
        document.getElementById('tt-rows').innerHTML = rows.join('<span style="color:var(--text3);margin:0 4px">·</span>');

        // Position
        const scaleX = rect.width / W;
        const scaleY = rect.height / H;
        const screenX = xOf(closest.date) * scaleX;
        const minYSvg = Math.min(
            closest.r > 0 ? yOf(closest.r) : H,
            closest.l > 0 ? yOf(closest.l) : H
        );
        tt.style.display = 'block';
        tt.style.left = `${Math.max(55, Math.min(rect.width - 55, screenX))}px`;
        tt.style.top  = `${Math.max(4, minYSvg * scaleY - tt.offsetHeight - 10)}px`;
    }
    svg.onclick = e => onInteract(e.clientX);
    svg.ontouchstart = e => { e.preventDefault(); onInteract(e.touches[0].clientX); };
}

    if (e.key === 'Enter') submitToday();
});
document.getElementById('grip-input-l').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('grip-input-r').focus();
});

// 每次進入都顯示帳號選擇畫面（不自動登入）
localStorage.removeItem('grip_user');
</script>
