<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>握力日記</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:           #0C0C12;
            --card:         #15151E;
            --card2:        #1C1C27;
            --border:       rgba(255,255,255,0.07);
            --accent:       #FF8C00;
            --accent-lt:    #FFB347;
            --accent-glow:  rgba(255, 140, 0, 0.18);
            --text:         #F2F2F7;
            --text2:        #8E8E9A;
            --text3:        #3A3A45;
            --green:        #34C759;
            --red:          #FF453A;
            --yellow:       #FFD60A;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
        }

        /* ── User Select ── */
        #user-select {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 32px 20px;
            gap: 28px;
        }

        .logo-wrap {
            text-align: center;
        }

        .logo-icon {
            font-size: 72px;
            display: block;
            filter: drop-shadow(0 0 28px rgba(255,140,0,0.45));
            animation: pulse-icon 3s ease-in-out infinite;
        }

        @keyframes pulse-icon {
            0%, 100% { filter: drop-shadow(0 0 28px rgba(255,140,0,0.45)); }
            50%       { filter: drop-shadow(0 0 44px rgba(255,140,0,0.70)); }
        }

        .logo-title {
            font-size: 30px;
            font-weight: 900;
            letter-spacing: -0.5px;
            margin-top: 12px;
        }

        .logo-sub {
            color: var(--text2);
            font-size: 13px;
            margin-top: 6px;
        }

        .user-cards {
            display: flex;
            gap: 14px;
            width: 100%;
            max-width: 360px;
        }

        .user-card {
            flex: 1;
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: 22px;
            padding: 28px 12px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-card:hover {
            border-color: var(--accent);
            background: var(--card2);
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(255,140,0,0.15);
        }

        .user-card .av { font-size: 42px; }
        .user-card .name { font-size: 18px; font-weight: 800; margin-top: 10px; }
        .user-card .role { font-size: 12px; color: var(--text2); margin-top: 3px; }

        /* ── Main App ── */
        #app {
            display: none;
            max-width: 480px;
            margin: 0 auto;
            padding: 0 16px 90px;
        }

        /* ── Tab bar ── */
        .tab-bar {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            display: none;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px 20px;
            background: rgba(12,12,18,0.92);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 100;
        }
        .tab-bar.visible { display: flex; }
        .tab-btn {
            flex: 1; max-width: 180px;
            padding: 10px 0;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--card2);
            color: var(--text2);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .tab-btn.active {
            background: rgba(255,140,0,0.12);
            border-color: rgba(255,140,0,0.4);
            color: var(--accent-lt);
        }

        /* ── Tab panels ── */
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }

        /* ── Header ── */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 0 4px;
        }

        .header-title {
            font-size: 20px;
            font-weight: 900;
        }

        .user-chip {
            background: var(--card2);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 7px 15px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.15s;
            color: var(--text2);
        }

        .user-chip:hover { border-color: var(--accent); color: var(--text); }

        /* ── Status Card ── */
        .status-card {
            background: var(--card);
            border-radius: 26px;
            padding: 26px 24px;
            margin: 14px 0 10px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        .status-card::after {
            content: '';
            position: absolute;
            top: -60px; right: -60px;
            width: 200px; height: 200px;
            border-radius: 50%;
            background: var(--accent-glow);
            pointer-events: none;
        }

        .status-date {
            font-size: 12px;
            color: var(--text2);
            font-weight: 600;
            margin-bottom: 18px;
            letter-spacing: 0.3px;
        }

        .status-main {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-emoji {
            font-size: 56px;
            line-height: 1;
            flex-shrink: 0;
        }

        .status-info { flex: 1; }

        .status-value {
            font-size: 48px;
            font-weight: 900;
            color: var(--accent-lt);
            line-height: 1;
            letter-spacing: -2px;
        }

        .status-unit {
            font-size: 18px;
            font-weight: 400;
            color: var(--text2);
            margin-left: 3px;
        }

        .status-label {
            font-size: 15px;
            font-weight: 700;
            margin-top: 6px;
            color: var(--text);
        }

        .status-diff {
            font-size: 12px;
            color: var(--text2);
            margin-top: 3px;
            font-weight: 500;
        }

        .status-diff.up   { color: var(--green); }
        .status-diff.down { color: var(--red); }

        .cold-badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: rgba(255,214,10,0.10);
            border: 1px solid rgba(255,214,10,0.28);
            border-radius: 100px;
            padding: 5px 12px;
            font-size: 12px;
            font-weight: 600;
            color: var(--yellow);
            margin-top: 14px;
        }

        /* ── Input Card ── */
        .input-card {
            background: var(--card);
            border-radius: 22px;
            padding: 22px;
            margin: 10px 0;
            border: 1px solid var(--border);
        }

        .input-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 14px;
        }

        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch;
        }

        .grip-input {
            flex: 1;
            background: var(--card2);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 14px 16px;
            font-size: 30px;
            font-weight: 800;
            color: var(--text);
            text-align: center;
            outline: none;
            transition: border-color 0.2s;
            -moz-appearance: textfield;
        }

        .grip-input::-webkit-inner-spin-button,
        .grip-input::-webkit-outer-spin-button { -webkit-appearance: none; }

        .grip-input:focus { border-color: var(--accent); }
        .grip-input::placeholder { color: var(--text3); font-size: 22px; font-weight: 400; }
        .grip-input:disabled { opacity: 0.38; cursor: not-allowed; }

        .submit-btn {
            background: var(--accent);
            border: none;
            border-radius: 16px;
            padding: 0 26px;
            font-size: 15px;
            font-weight: 800;
            color: #fff;
            cursor: pointer;
            transition: all 0.15s;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .submit-btn:hover:not(:disabled) {
            background: var(--accent-lt);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(255,140,0,0.35);
        }

        .submit-btn:active:not(:disabled) { transform: scale(0.97); }

        .submit-btn:disabled {
            background: var(--card2);
            color: var(--text3);
            cursor: not-allowed;
        }

        .recorded-line {
            text-align: center;
            color: var(--green);
            font-size: 12px;
            font-weight: 600;
            margin-top: 10px;
            display: none;
            gap: 5px;
            align-items: center;
            justify-content: center;
        }

        /* ── Section label ── */
        .section-label {
            font-size: 11px;
            font-weight: 700;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 18px 0 8px;
        }

        /* ── Stats Row ── */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .stat-box {
            background: var(--card);
            border-radius: 18px;
            padding: 16px 10px;
            text-align: center;
            border: 1px solid var(--border);
        }

        .stat-val {
            font-size: 24px;
            font-weight: 900;
            color: var(--text);
            letter-spacing: -0.5px;
        }

        .stat-name {
            font-size: 11px;
            color: var(--text2);
            margin-top: 3px;
            font-weight: 500;
        }

        .stat-extra {
            margin-top: 5px;
            font-size: 10px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            border-radius: 100px;
            padding: 2px 8px;
            font-size: 10px;
            font-weight: 700;
        }

        .tag-orange { background: rgba(255,140,0,0.12); color: var(--accent-lt); }
        .tag-green  { background: rgba(52,199,89,0.12);  color: var(--green); }
        .tag-red    { background: rgba(255,69,58,0.12);   color: var(--red); }
        .tag-muted  { background: rgba(142,142,154,0.12); color: var(--text2); }

        /* ── Fatigue Warning ── */
        .fatigue-wrap {
            background: rgba(255,69,58,0.08);
            border: 1px solid rgba(255,69,58,0.22);
            border-radius: 18px;
            padding: 14px 18px;
            display: none;
            align-items: center;
            gap: 12px;
            margin: 10px 0;
        }

        .fatigue-icon { font-size: 26px; }

        .fatigue-title { font-size: 14px; font-weight: 700; color: var(--red); }
        .fatigue-sub   { font-size: 12px; color: var(--text2); margin-top: 2px; }

        /* ── Chart Card ── */
        .chart-card {
            background: var(--card);
            border-radius: 22px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .card-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .card-title { font-size: 14px; font-weight: 700; }

        .legend {
            display: flex;
            gap: 12px;
            font-size: 11px;
            color: var(--text2);
            align-items: center;
        }

        .leg-line {
            display: inline-block;
            width: 14px; height: 2px;
            border-radius: 2px;
            vertical-align: middle;
            margin-right: 3px;
        }

        .leg-dash {
            display: inline-block;
            width: 14px; height: 0;
            border-top: 2px dashed #8E8E9A;
            vertical-align: middle;
            margin-right: 3px;
        }

        .chart-svg {
            width: 100%;
            overflow: visible;
            display: block;
        }

        /* ── Records List ── */
        .records-card {
            background: var(--card);
            border-radius: 22px;
            padding: 6px 20px;
            border: 1px solid var(--border);
        }

        .rec-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        .rec-row:last-child { border-bottom: none; }

        .rec-date {
            font-size: 13px;
            color: var(--text2);
            font-weight: 500;
        }

        .rec-date.today { color: var(--accent-lt); font-weight: 700; }

        .rec-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .rec-val { font-size: 17px; font-weight: 800; }

        .rec-delta {
            font-size: 11px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 100px;
        }

        /* ── Empty State ── */
        .empty-state {
            text-align: center;
            padding: 36px 20px;
            color: var(--text2);
        }

        .empty-icon { font-size: 44px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; font-weight: 600; }
        .empty-sub  { font-size: 12px; color: var(--text3); margin-top: 5px; }

        /* ── Toast ── */
        #toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(110px);
            background: #22222F;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 100px;
            padding: 12px 24px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            transition: transform 0.32s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 999;
            white-space: nowrap;
            pointer-events: none;
        }

        #toast.show { transform: translateX(-50%) translateY(0); }

        /* ── Edit Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px); display: flex; align-items: center;
            justify-content: center; z-index: 900; padding: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: all; }
        .modal-box {
            background: var(--card); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 24px; padding: 28px 24px; width: 100%; max-width: 320px;
            transform: translateY(16px); transition: transform 0.25s;
        }
        .modal-overlay.show .modal-box { transform: translateY(0); }
        .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
        .modal-sub { font-size: 12px; color: var(--text2); margin-bottom: 18px; }
        .modal-input {
            width: 100%; background: var(--card2); border: 2px solid var(--border);
            border-radius: 14px; padding: 14px 16px; font-size: 28px; font-weight: 800;
            color: var(--text); text-align: center; outline: none; font-family: inherit;
            transition: border-color 0.2s; -moz-appearance: textfield;
        }
        .modal-input::-webkit-inner-spin-button,
        .modal-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .modal-input:focus { border-color: var(--accent); }
        .modal-actions { display: flex; gap: 10px; margin-top: 18px; }
        .modal-btn {
            flex: 1; padding: 13px; border-radius: 14px; border: none; font-size: 14px;
            font-weight: 700; cursor: pointer; font-family: inherit; transition: all 0.15s;
        }
        .modal-btn-cancel { background: var(--card2); color: var(--text2); }
        .modal-btn-cancel:hover { color: var(--text); }
        .modal-btn-confirm { background: var(--accent); color: #fff; }
        .modal-btn-confirm:hover { background: var(--accent-lt); }
    </style>
</head>
<body>

<!-- ── User Selection Screen ── -->
<div id="user-select">
    <div class="logo-wrap">
        <span class="logo-icon">🤜</span>
        <div class="logo-title">握力日記</div>
        <div class="logo-sub">記錄每日握力，見證你的進步</div>
    </div>
    <div class="user-cards">
        <div class="user-card" onclick="selectUser('p1')">
            <div class="av">🧑‍💻</div>
            <div class="name">至凱</div>
            <div class="role">偶爾記錄</div>
        </div>
        <div class="user-card" onclick="selectUser('p2')">
            <div class="av">🏋️</div>
            <div class="name">柏致</div>
            <div class="role">主力訓練</div>
        </div>
    </div>
</div>

<!-- ── Main App ── -->
<div id="app">
    <div class="header">
        <div style="display:flex;align-items:center;gap:10px">
            <a href="index.html" style="background:var(--card2);border:1px solid var(--border);border-radius:100px;padding:7px 13px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:all 0.15s" onmouseover="this.style.borderColor='var(--accent)';this.style.color='var(--text)'" onmouseout="this.style.borderColor='var(--border)';this.style.color='var(--text2)'">← 首頁</a>
            <div class="header-title">🤜 握力日記</div>
        </div>
        <div class="user-chip" id="user-chip" onclick="switchUser()">— · 切換</div>
    </div>

    <!-- Tab panel: 記錄 -->
    <div class="tab-panel active" id="panel-record">
        <!-- Status card -->
        <div class="status-card">
            <div class="status-date" id="status-date">載入中...</div>
            <div class="status-main">
                <div class="status-emoji" id="s-emoji">⏳</div>
                <div class="status-info">
                    <div>
                        <span class="status-value" id="s-value">—</span>
                        <span class="status-unit">kg</span>
                    </div>
                    <div class="status-label" id="s-label">今日尚未記錄</div>
                    <div class="status-diff" id="s-diff"></div>
                </div>
            </div>
            <div id="s-extra"></div>
        </div>

        <!-- Input card -->
        <div class="input-card">
            <div class="input-label">輸入今日握力 (kg)</div>
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:10px;">
                <div>
                    <div style="font-size:11px; color:var(--text2); margin-bottom:6px; text-align:center; font-weight:600;">🤜 左手</div>
                    <input type="number" id="grip-input-l" class="grip-input"
                           placeholder="0" min="1" max="200" step="0.5">
                </div>
                <div>
                    <div style="font-size:11px; color:var(--text2); margin-bottom:6px; text-align:center; font-weight:600;">🤛 右手</div>
                    <input type="number" id="grip-input-r" class="grip-input"
                           placeholder="0" min="1" max="200" step="0.5">
                </div>
            </div>
            <button class="submit-btn" id="submit-btn" onclick="submitToday()" style="width:100%; padding:14px 26px;">記錄</button>
            <div class="recorded-line" id="recorded-line" style="display:none">
                <span style="color:var(--green)">✓</span> 今天已記錄
                <button onclick="openEditModal()" style="margin-left:8px;background:none;border:none;color:var(--text2);font-size:12px;cursor:pointer;text-decoration:underline;padding:0">修改</button>
            </div>
        </div>
    </div>

    <!-- Tab panel: 統計 -->
    <div class="tab-panel" id="panel-stats">
        <!-- Stats -->
        <div class="section-label">數據分析</div>
        <div class="stats-row">
            <div class="stat-box">
                <div class="stat-val" id="stat-pr">—</div>
                <div class="stat-name">個人紀錄</div>
                <div class="stat-extra" id="stat-pr-date"></div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-7avg">—</div>
                <div class="stat-name">7日均值</div>
                <div class="stat-extra" id="stat-trend"></div>
            </div>
            <div class="stat-box">
                <div class="stat-val" id="stat-30avg">—</div>
                <div class="stat-name">30日均值</div>
                <div class="stat-extra" id="stat-days"></div>
            </div>
        </div>

        <!-- Fatigue warning -->
        <div class="fatigue-wrap" id="fatigue-wrap">
            <div class="fatigue-icon">⚠️</div>
            <div>
                <div class="fatigue-title">連續疲勞警告</div>
                <div class="fatigue-sub" id="fatigue-sub"></div>
            </div>
        </div>

        <!-- Chart -->
        <div class="section-label">30日走勢</div>
        <div class="chart-card">
            <div class="card-head">
                <div class="card-title">握力趨勢</div>
                <div class="legend">
                    <span><span class="leg-line" style="background:#FF8C00"></span>右手</span>
                    <span><span class="leg-line" style="background:#5AC8FA"></span>左手</span>
                    <span><span class="leg-dash"></span>7日均</span>
                </div>
            </div>
            <svg id="chart-svg" class="chart-svg" viewBox="0 0 520 160"
                 preserveAspectRatio="none" style="height:160px"></svg>
        </div>

        <!-- Recent records -->
        <div class="section-label">近期紀錄</div>
        <div class="records-card" id="records-card">
            <div class="empty-state">
                <div class="empty-icon">💪</div>
                <div class="empty-text">開始你的第一次記錄吧！</div>
            </div>
        </div>
    </div>
</div>

<!-- Tab bar -->
<div class="tab-bar" id="tab-bar">
    <button class="tab-btn active" id="tab-record" onclick="switchTab('record')">📝 記錄</button>
    <button class="tab-btn" id="tab-stats" onclick="switchTab('stats')">📊 統計</button>
</div>

<div id="toast"></div>

<!-- Edit Modal -->
<div class="modal-overlay" id="edit-modal" onclick="closeEditModal(event)">
    <div class="modal-box">
        <div class="modal-title">修改紀錄</div>
        <div class="modal-sub" id="edit-modal-sub"></div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-bottom:14px;">
            <div>
                <div style="font-size:11px; color:#8E8E9A; margin-bottom:6px; text-align:center; font-weight:600;">🤜 左手</div>
                <input type="number" class="modal-input" id="edit-modal-input-l"
                       min="1" max="200" step="0.5" placeholder="0">

<script>
// ── Firebase ──────────────────────────────────────────────────────────
const firebaseConfig = {

// ── Helpers ───────────────────────────────────────────────────────────
function todayStr() {

function fmtShort(str) {

function fmtFull(str) {
    const [y, m, d] = str.split('-');

// ── User ──────────────────────────────────────────────────────────────

// ── Load ──────────────────────────────────────────────────────────────
function loadRecords() {
    if (dbListener) db.ref(`grip/${ME}/records`).off('value', dbListener);
    dbListener = db.ref(`grip/${ME}/records`).on('value', snap => {
        records = snap.val() || {};
        render();
    });
}

// ── Sorted records ────────────────────────────────────────────────────
// Normalises both legacy (number) and new ({ l, r }) records.
// `value` = max(l, r) used for all stats/chart compatibility.
function getSorted() {
    return Object.entries(records)
        .map(([date, raw]) => {
            let l, r;
            if (raw !== null && typeof raw === 'object') {
                l = Number(raw.l) || 0;
                r = Number(raw.r) || 0;
            } else {
                // Legacy: single number → treat as right hand
                l = Number(raw) || 0;
                r = Number(raw) || 0;
            }
            const recorded = [l, r].filter(v => v > 0);
            const value = recorded.length ? recorded.reduce((s, v) => s + v, 0) / recorded.length : 0;
            return { date, l, r, value };
        })
        .sort((a, b) => a.date < b.date ? -1 : 1);
}

// ── Status ────────────────────────────────────────────────────────────
// Returns null if today not recorded.
// Returns { type, diff, avg7 } or { type:'cold', remaining }
function calcStatus(sorted, today) {
    const todayIdx = sorted.findIndex(r => r.date === today);
    if (todayIdx < 0) return null;

    const prior = sorted.slice(0, todayIdx);
    if (prior.length < 7) return { type: 'cold', remaining: 7 - prior.length };

    const last7 = prior.slice(-7);
    const avg7 = last7.reduce((s, r) => s + r.value, 0) / 7;
    const val = sorted[todayIdx].value;
    const diff = (val - avg7) / avg7;

    if (diff > 0.05)  return { type: 'fire',   diff, avg7 };
    if (diff >= 0)    return { type: 'strong',  diff, avg7 };
    if (diff >= -0.05) return { type: 'tired',  diff, avg7 };
    return              { type: 'rest',  diff, avg7 };
}

// Records below 7-day prior average, from most recent backwards
// Returns { count, isConsecutiveCalendar }
function fatigueDays(sorted) {
    const fatigueRecs = [];
    for (let i = sorted.length - 1; i >= 7; i--) {
        const avg = sorted.slice(i-7, i).reduce((s, r) => s + r.value, 0) / 7;
        if (sorted[i].value < avg) fatigueRecs.unshift(sorted[i]);
        else break;
    }
    if (fatigueRecs.length === 0) return { count: 0, isConsecutiveCalendar: true };
    let isConsecutiveCalendar = true;
    for (let i = 1; i < fatigueRecs.length; i++) {
        const diff = (new Date(fatigueRecs[i].date) - new Date(fatigueRecs[i-1].date)) / 86400000;
        if (diff > 1) { isConsecutiveCalendar = false; break; }
    }
    return { count: fatigueRecs.length, isConsecutiveCalendar };
}

// 7-day rolling avg at index i (uses i-7 to i-1)
function rollingAvg7At(sorted, i) {
    if (i < 7) return null;
    return sorted.slice(i-7, i).reduce((s, r) => s + r.value, 0) / 7;
}

// ── Render ────────────────────────────────────────────────────────────
function render() {
    const sorted = getSorted();
    const today = todayStr();
    const todayVal = records[today];
    const hasToday = todayVal != null;

    // Header date
    const now = new Date();
    document.getElementById('status-date').textContent =
        `${fmtFull(today)} 週${WEEK[now.getDay()]}`;

    // Status card
    renderStatusCard(sorted, today, hasToday);

    // Input state
    const inputL = document.getElementById('grip-input-l');
    const inputR = document.getElementById('grip-input-r');
    const btn = document.getElementById('submit-btn');
    const recLine = document.getElementById('recorded-line');
    if (hasToday) {
        const todayRec = sorted.find(r => r.date === today);
        inputL.value = todayRec ? todayRec.l : '';
        inputR.value = todayRec ? todayRec.r : '';
        inputL.disabled = true;
        inputR.disabled = true;
        btn.disabled = true;
        recLine.style.display = 'flex';
    } else {
        inputL.value = '';
        inputR.value = '';
        inputL.disabled = false;
        inputR.disabled = false;
        btn.disabled = false;
        recLine.style.display = 'none';
    }

    // Stats
    renderStats(sorted);

    // Fatigue
    const { count: fc, isConsecutiveCalendar } = fatigueDays(sorted);
    const fw = document.getElementById('fatigue-wrap');
    if (fc >= 3) {
        fw.style.display = 'flex';
        const label = isConsecutiveCalendar ? `連續 ${fc} 天` : `${fc} 筆`;
        document.getElementById('fatigue-sub').textContent =
            `已 ${label} 低於7日基準，考慮讓身體休息一下`;
    } else {
        fw.style.display = 'none';
    }

    // Chart
    renderChart(sorted);

    // Records list
    renderList(sorted);
}

function renderStatusCard(sorted, today, hasToday) {
    const emojiEl = document.getElementById('s-emoji');
    const valEl   = document.getElementById('s-value');
    const lblEl   = document.getElementById('s-label');
    const diffEl  = document.getElementById('s-diff');
    const extraEl = document.getElementById('s-extra');

    if (!hasToday) {
        emojiEl.textContent = sorted.length === 0 ? '💪' : '⏳';
        valEl.textContent = '—';
        lblEl.textContent = '今日尚未記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = '';
        return;
    }

    const status = calcStatus(sorted, today);
    const todayRec = sorted.find(r => r.date === today);
    valEl.textContent = todayRec ? todayRec.value.toFixed(1) : '—';

    if (!status) {
        emojiEl.textContent = '💪';
        lblEl.textContent = '已記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = '';
        return;
    }

    if (status.type === 'cold') {
        emojiEl.textContent = '📈';
        lblEl.textContent = '已記錄';
        diffEl.textContent = '';
        extraEl.innerHTML = `<div class="cold-badge">⏳ 累積基準中，還需 ${status.remaining} 筆</div>`;
        return;
    }

    extraEl.innerHTML = '';

    const pct  = (status.diff * 100).toFixed(1);
    const sign = status.diff >= 0 ? '+' : '';

    const cfg = {
        fire:   { emoji: '🔥', lbl: '狀態極佳！今天超越了自己',  cls: 'up' },
        strong: { emoji: '💪', lbl: '表現穩定，維持在水準上',    cls: 'up' },
        tired:  { emoji: '😮‍💨', lbl: '今天有點疲憊',             cls: 'down' },
        rest:   { emoji: '🛌', lbl: '建議充分休息，養精蓄銳',    cls: 'down' },
    };
    const c = cfg[status.type];
    emojiEl.textContent = c.emoji;
    lblEl.textContent   = c.lbl;
    diffEl.textContent  = `${sign}${pct}% vs 7日均線（${status.avg7.toFixed(1)} kg）`;
    diffEl.className    = `status-diff ${c.cls}`;
    // Show left/right breakdown if different
    if (todayRec && todayRec.l !== todayRec.r) {
        extraEl.innerHTML = `<div style="margin-top:10px; font-size:12px; color:var(--text2);">🤜 左手 <strong style="color:var(--text)">${todayRec.l} kg</strong> &nbsp;·&nbsp; 🤛 右手 <strong style="color:var(--text)">${todayRec.r} kg</strong></div>`;
    }
}

function renderStats(sorted) {
    const prEl     = document.getElementById('stat-pr');
    const prDate   = document.getElementById('stat-pr-date');
    const avg7El   = document.getElementById('stat-7avg');
    const trendEl  = document.getElementById('stat-trend');
    const avg30El  = document.getElementById('stat-30avg');
    const daysEl   = document.getElementById('stat-days');

    if (sorted.length === 0) {
        [prEl, avg7El, avg30El].forEach(e => e.textContent = '—');
        prDate.innerHTML = trendEl.innerHTML = daysEl.innerHTML = '';
        return;
    }

    // PR
    const pr = sorted.reduce((mx, r) => r.value > mx.value ? r : mx, sorted[0]);
    const isToday = pr.date === todayStr();
    prEl.textContent = pr.value;
    prDate.innerHTML = `<span class="tag tag-orange">${isToday ? '今天！' : fmtShort(pr.date)}</span>`;

    // 7-day avg
    const last7 = sorted.slice(-7);
    const avg7 = last7.reduce((s, r) => s + r.value, 0) / last7.length;
    avg7El.textContent = avg7.toFixed(1);

    // Trend: recent 7 vs prior 7
    const prev7 = sorted.slice(-14, -7);
    if (prev7.length >= 3) {
        const pAvg = prev7.reduce((s, r) => s + r.value, 0) / prev7.length;
        const diff = (avg7 - pAvg) / pAvg;
        if (diff > 0.02)
            trendEl.innerHTML = `<span class="tag tag-green">↑ 上升</span>`;
        else if (diff < -0.02)
            trendEl.innerHTML = `<span class="tag tag-red">↓ 下降</span>`;
        else
            trendEl.innerHTML = `<span class="tag tag-muted">→ 穩定</span>`;
    } else {
        trendEl.innerHTML = `<span class="tag tag-muted">累積中</span>`;
    }

    // 30-day avg
    const last30 = sorted.slice(-30);
    const avg30 = last30.reduce((s, r) => s + r.value, 0) / last30.length;
    avg30El.textContent = avg30.toFixed(1);
    daysEl.innerHTML = `<span class="tag tag-muted">${sorted.length} 天</span>`;
}

// ── Chart ─────────────────────────────────────────────────────────────
function buildLineSegs(data, xOf, yOf, valFn) {
    const GAP_MS = 86400000 * 1.5;
    const segs = [];
    let cur = [];
    data.forEach((d, i) => {
        if (i > 0 && new Date(d.date) - new Date(data[i-1].date) > GAP_MS) {
            if (cur.length >= 2) segs.push(cur);
            cur = [];
        }
        cur.push(`${xOf(d.date)},${yOf(valFn(d))}`);
    });
    if (cur.length >= 1) segs.push(cur);
    return segs;
}

function renderChart(sorted) {
    const svg = document.getElementById('chart-svg');

    if (sorted.length < 2) {
        svg.innerHTML = `<text x="260" y="80" text-anchor="middle" fill="#3A3A45"
            font-size="13" font-family="-apple-system,sans-serif">需要更多數據（至少 2 筆）</text>`;
        return;
    }

    const data = sorted.slice(-30);
    const n    = data.length;
    const today = todayStr();

    const W  = 520, H = 160;
    const PL = 34, PR = 10, PT = 10, PB = 28;
    const cW = W - PL - PR;
    const cH = H - PT - PB;

    // Include both l and r for Y scale
    const allVals = data.flatMap(d => [d.l, d.r]).filter(v => v > 0);
    const minV = Math.min(...allVals);
    const maxV = Math.max(...allVals);
    const range = maxV - minV || 1;

    const t0 = new Date(data[0].date).getTime();
    const t1 = new Date(data[n-1].date).getTime();
    const tSpan = t1 - t0 || 1;
    const xOf = dateStr => PL + ((new Date(dateStr).getTime() - t0) / tSpan) * cW;
    const yOf = v => PT + cH - ((v - minV) / range) * cH;

    // Two lines: right (orange) and left (blue)
    const segsR = buildLineSegs(data, xOf, yOf, d => d.r);
    const segsL = buildLineSegs(data, xOf, yOf, d => d.l);

    // 7-day rolling baseline (based on max value)
    const GAP_MS = 86400000 * 1.5;
    const baseSegs = [];
    let bSeg = [];
    data.forEach((d, i) => {
        if (i > 0 && new Date(d.date) - new Date(data[i-1].date) > GAP_MS) {
            if (bSeg.length >= 2) baseSegs.push(bSeg.join(' '));
            bSeg = [];
        }
        const globalIdx = sorted.findIndex(r => r.date === d.date);
        const avg = rollingAvg7At(sorted, globalIdx);
        if (avg !== null) bSeg.push(`${xOf(d.date)},${yOf(avg)}`);
        else { if (bSeg.length >= 2) baseSegs.push(bSeg.join(' ')); bSeg = []; }
    });
    if (bSeg.length >= 2) baseSegs.push(bSeg.join(' '));

    // Y axis labels
    const yLevels = [minV, (minV+maxV)/2, maxV];
    const yLabels = yLevels.map(v =>
        `<text x="${PL-4}" y="${yOf(v)}" text-anchor="end" dominant-baseline="middle"
            fill="#3A3A45" font-size="9" font-family="-apple-system,sans-serif">${Math.round(v)}</text>`
    ).join('');

    // X axis labels
    const step = Math.max(1, Math.floor(n / 5));
    const xLabels = data.map((d, i) => {
        if (i % step !== 0 && i !== n-1) return '';
        return `<text x="${xOf(d.date)}" y="${H-3}" text-anchor="middle"
            fill="#3A3A45" font-size="9" font-family="-apple-system,sans-serif">${fmtShort(d.date)}</text>`;
    }).join('');

    // Dots for both hands
    const dotsR = data.map(d => {
        const isT = d.date === today;
        return `<circle cx="${xOf(d.date)}" cy="${yOf(d.r)}"
            r="${isT ? 5 : 2.5}" fill="#FF8C00"
            stroke="${isT ? '#fff' : 'none'}" stroke-width="${isT ? 1.5 : 0}"/>`;
    }).join('');
    const dotsL = data.map(d => {
        const isT = d.date === today;
        return `<circle cx="${xOf(d.date)}" cy="${yOf(d.l)}"
            r="${isT ? 5 : 2.5}" fill="#5AC8FA"
            stroke="${isT ? '#fff' : 'none'}" stroke-width="${isT ? 1.5 : 0}"/>`;
    }).join('');

    svg.innerHTML = `
        <line x1="${PL}" y1="${PT}" x2="${PL}" y2="${PT+cH}" stroke="#1C1C27" stroke-width="1"/>
        <line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="#1C1C27" stroke-width="1"/>
        ${yLabels}
        ${xLabels}
        ${baseSegs.map(pts =>
            `<polyline points="${pts}" fill="none" stroke="#3A3A52"
                stroke-width="1.5" stroke-dasharray="5,3"/>`
        ).join('')}
        ${segsL.map(pts =>
            `<polyline points="${pts.join(' ')}" fill="none" stroke="#5AC8FA"
                stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>`
        ).join('')}
        ${segsR.map(pts =>
            `<polyline points="${pts.join(' ')}" fill="none" stroke="#FF8C00"
                stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>`
        ).join('')}
        ${dotsL}
        ${dotsR}`;
}

// ── Records List ──────────────────────────────────────────────────────
function renderList(sorted) {
    const el = document.getElementById('records-card');

    if (sorted.length === 0) {
        el.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">💪</div>
                <div class="empty-text">開始你的第一次記錄吧！</div>
                <div class="empty-sub">每天一次，見證自己的成長</div>
            </div>`;
        return;
    }

    const recent = sorted.slice(-10).reverse();
    el.innerHTML = recent.map(r => {
        const idx = sorted.findIndex(s => s.date === r.date);
        const isT = r.date === todayStr();
        const isLegacy = r.l === r.r; // both same → came from single-value legacy

        let deltaHTML = '';
        if (idx > 0) {
            const delta = r.value - sorted[idx-1].value;
            const sign = delta >= 0 ? '+' : '';
            const cls = delta > 0 ? 'tag-green' : delta < 0 ? 'tag-red' : 'tag-muted';
            deltaHTML = `<span class="rec-delta tag ${cls}">${sign}${delta.toFixed(1)}</span>`;
        }

        const handHTML = isLegacy
            ? `<div class="rec-val">${r.value}<span style="font-size:12px;color:var(--text2);font-weight:400"> kg</span></div>`
            : `<div style="display:flex;flex-direction:column;align-items:flex-end;gap:1px;">
                <div style="font-size:13px;font-weight:700;color:#5AC8FA">🤜 ${r.l}<span style="font-size:11px;font-weight:400"> kg</span></div>
                <div style="font-size:13px;font-weight:700;color:#FF8C00">🤛 ${r.r}<span style="font-size:11px;font-weight:400"> kg</span></div>
               </div>`;

        return `<div class="rec-row">
            <div class="rec-date ${isT ? 'today' : ''}">${isT ? '今天' : fmtShort(r.date)}</div>
            <div class="rec-right">
                ${handHTML}
                ${deltaHTML}
                <button onclick="openEditModalDate('${r.date}')" style="margin-left:6px;background:none;border:none;color:var(--text2);font-size:13px;cursor:pointer;padding:2px 4px;border-radius:6px;transition:color 0.15s" title="編輯" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text2)'">✏️</button>
            </div>
        </div>`;
    }).join('');
}

// ── Sound ─────────────────────────────────────────────────────────────
const AC = new (window.AudioContext || window.webkitAudioContext)();
function beep(freq, dur, type='sine', vol=0.18) {
    const o = AC.createOscillator(), g = AC.createGain();
    o.connect(g); g.connect(AC.destination);
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, AC.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, AC.currentTime + dur);
    o.start(); o.stop(AC.currentTime + dur);
}
function sfxRecord()  { beep(520,0.08); setTimeout(()=>beep(780,0.12),80); }
function sfxEdit()    { beep(400,0.06,'triangle'); setTimeout(()=>beep(500,0.08,'triangle'),60); }
function sfxError()   { beep(220,0.18,'sawtooth',0.1); }

// ── Edit today (via modal) ────────────────────────────────────────────
let editingDate = null;

function openEditModal() { openEditModalDate(todayStr()); }

function openEditModalDate(date) {
    const raw = records[date];
    let l = 0, r = 0;
    if (raw !== null && typeof raw === 'object') {
        l = raw.l || 0; r = raw.r || 0;
    } else if (raw) {
        l = Number(raw); r = Number(raw);
    }
    editingDate = date;
    sfxEdit();
    document.getElementById('edit-modal-sub').textContent = `修改 ${fmtFull(date)} 的紀錄`;
    document.getElementById('edit-modal-input-l').value = l || '';
    document.getElementById('edit-modal-input-r').value = r || '';
    document.getElementById('edit-modal').classList.add('show');
    document.getElementById('edit-modal-input-r').focus();
}

function closeEditModal(e) {
    if (e && e.target !== document.getElementById('edit-modal')) return;
    document.getElementById('edit-modal').classList.remove('show');
    editingDate = null;
}

function confirmEdit() {
    const rawL = document.getElementById('edit-modal-input-l').value;
    const rawR = document.getElementById('edit-modal-input-r').value;
    const l = parseFloat(rawL), r = parseFloat(rawR);
    if ((!rawL && !rawR) || (rawL && (isNaN(l) || l <= 0 || l > 200)) || (rawR && (isNaN(r) || r <= 0 || r > 200))) {
        showToast('⚠️ 請輸入有效握力值（1–200 kg）');
        return;
    }
    const finalL = rawL ? Math.round(l * 10) / 10 : 0;
    const finalR = rawR ? Math.round(r * 10) / 10 : 0;
    if (finalL === 0 && finalR === 0) { showToast('⚠️ 請至少輸入一手的握力值'); return; }
    const date = editingDate || todayStr();
    db.ref(`grip/${ME}/records/${date}`).set({ l: finalL, r: finalR })
        .then(() => { sfxRecord(); showToast('✅ 紀錄已更新！'); document.getElementById('edit-modal').classList.remove('show'); editingDate = null; })
        .catch(() => { sfxError(); showToast('❌ 儲存失敗，請重試'); });
}

// ── Submit ────────────────────────────────────────────────────────────
function submitToday() {
    const rawL = document.getElementById('grip-input-l').value;
    const rawR = document.getElementById('grip-input-r').value;
    const l = parseFloat(rawL), r = parseFloat(rawR);

    if (!rawL && !rawR) { showToast('⚠️ 請輸入左手或右手的握力值'); return; }
    if (rawL && (isNaN(l) || l <= 0 || l > 200)) { showToast('⚠️ 左手數值無效（1–200 kg）'); return; }
    if (rawR && (isNaN(r) || r <= 0 || r > 200)) { showToast('⚠️ 右手數值無效（1–200 kg）'); return; }

    const finalL = rawL ? Math.round(l * 10) / 10 : 0;
    const finalR = rawR ? Math.round(r * 10) / 10 : 0;

    db.ref(`grip/${ME}/records/${todayStr()}`).set({ l: finalL, r: finalR })
        .then(() => { sfxRecord(); showToast('✅ 今日握力已記錄！'); })
        .catch(() => { sfxError(); showToast('❌ 儲存失敗，請重試'); });
}

document.getElementById('grip-input-r').addEventListener('keydown', e => {
    if (e.key === 'Enter') submitToday();
});
document.getElementById('grip-input-l').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('grip-input-r').focus();
});

// ── Auto-login ────────────────────────────────────────────────────────
const saved = localStorage.getItem('grip_user');
if (saved === 'p1' || saved === 'p2') selectUser(saved);
</script>
</body>
</html>
